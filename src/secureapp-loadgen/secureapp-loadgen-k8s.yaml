# SecureApp loadgen — Java vulnerability test app.
# Reports as whatever OTEL_SERVICE_NAME is set to (currently "shipping-api").
# Exercises 5 vulnerability classes for Splunk SecureApp agent detection.
# Deployed via separate manifest group (secureapp).
# See usage.md for configuration details.
---
apiVersion: v1
kind: Service
metadata:
  name: secureapp-loadgen
  labels:
    opentelemetry.io/name: secureapp-loadgen
    app.kubernetes.io/component: secureapp-loadgen
    app.kubernetes.io/name: secureapp-loadgen
    app.kubernetes.io/version: "2.1.3"
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  type: ClusterIP
  ports:
  - port: 8080
    name: tcp-service
    targetPort: 8080
  selector:
    opentelemetry.io/name: secureapp-loadgen
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureapp-loadgen
  labels:
    opentelemetry.io/name: secureapp-loadgen
    app.kubernetes.io/component: secureapp-loadgen
    app.kubernetes.io/name: secureapp-loadgen
    app.kubernetes.io/version: "2.1.3"
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: secureapp-loadgen
  template:
    metadata:
      labels:
        opentelemetry.io/name: secureapp-loadgen
        app.kubernetes.io/component: secureapp-loadgen
        app.kubernetes.io/name: secureapp-loadgen
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
      - name: secureapp-loadgen
        image: ghcr.io/splunk/opentelemetry-demo/otel-secureapp-loadgen:2.0.4
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: service
        command: ["/bin/sh"]
        args:
        - -c
        - |
          export OTEL_RESOURCE_ATTRIBUTES="service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=2.1.3,deployment.environment=${DEPLOYMENT_ENVIRONMENT}"
          exec ./entrypoint.sh
        env:
        - name: DEPLOYMENT_ENVIRONMENT
          valueFrom:
            secretKeyRef:
              name: workshop-secret
              key: env
        - name: SHIPPING_API
          valueFrom:
            secretKeyRef:
              name: workshop-secret
              key: shipping_api
              optional: true
        - name: OTEL_SERVICE_NAME
          value: "shipping-api"
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_COLLECTOR_NAME
          value: $(NODE_IP)
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4318
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: http/protobuf
        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative
        - name: SPLUNK_PROFILER_ENABLED
          value: 'true'
        - name: SPLUNK_PROFILER_MEMORY_ENABLED
          value: 'true'
        - name: SPLUNK_PROFILER_LOGS_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4318/v1/logs
        - name: SPLUNK_METRICS_ENABLED
          value: 'true'
        - name: JAVA_TOOL_OPTIONS
          value: -javaagent:/app/splunk-otel-javaagent.jar
            -Dargento.allow.security.events=true
            -Dargento.wait.events.for.first.transaction=false
            -Dotel.instrumentation.common.peer-service-mapping=shipping:8080=shipping
        - name: SHIPPING_ADDR
          value: http://shipping:8080
        - name: FLAGD_HOST
          value: flagd
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
        volumeMounts: null
      volumes: null

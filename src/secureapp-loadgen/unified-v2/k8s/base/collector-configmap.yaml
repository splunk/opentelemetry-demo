apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  labels:
    app.kubernetes.io/name: collector
    app.kubernetes.io/part-of: unified-secureapp
data:
  otelcol-config.yaml: |
    extensions:
      headers_setter:
        headers:
          - action: upsert
            key: X-SF-TOKEN
            from_context: X-SF-TOKEN
            default_value: "${SPLUNK_ACCESS_TOKEN}"
      health_check:
        endpoint: "${SPLUNK_LISTEN_INTERFACE}:13133"

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "${SPLUNK_LISTEN_INTERFACE}:4317"
          http:
            endpoint: "${SPLUNK_LISTEN_INTERFACE}:4318"
      # Node/host infrastructure metrics (Splunk agent default)
      host_metrics:
        collection_interval: 10s
        root_path: /hostfs
        scrapers:
          cpu:
          disk:
          filesystem:
            include_mount_points:
              match_type: strict
              mount_points:
                - "/"
          memory:
          network:
          load:
          paging:
          processes:
      # Kubernetes pod/node/container metrics
      kubeletstats:
        collection_interval: 10s
        auth_type: serviceAccount
        endpoint: ${env:K8S_NODE_IP}:10250
        insecure_skip_verify: true
        metric_groups:
          - container
          - pod
          - node
        extra_metadata_labels:
          - container.id
      prometheus/internal:
        config:
          scrape_configs:
            - job_name: otel-collector
              scrape_interval: 10s
              static_configs:
                - targets: ["0.0.0.0:8888"]
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: "promhttp_metric_handler_errors.*"
                  action: drop
                - source_labels: [__name__]
                  regex: "otelcol_processor_batch_.*"
                  action: drop

    processors:
      batch:
        metadata_keys:
          - X-SF-Token
      memory_limiter:
        check_interval: 2s
        limit_mib: ${SPLUNK_MEMORY_LIMIT_MIB}
      resourcedetection:
        detectors: [system]
        override: true
      resource/add_mode:
        attributes:
          - action: insert
            value: "agent"
            key: otelcol.service.mode

    exporters:
      otlp_http:
        traces_endpoint: "${SPLUNK_INGEST_URL}/v2/trace/otlp"
        headers:
          "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"
        auth:
          authenticator: headers_setter
      signalfx:
        access_token: "${SPLUNK_ACCESS_TOKEN}"
        api_url: "${SPLUNK_API_URL}"
        ingest_url: "${SPLUNK_INGEST_URL}"
        sync_host_metadata: true
      otlp_http/secureapp:
        logs_endpoint: "${SPLUNK_INGEST_URL}/v3/event"
        headers:
          "X-SF-TOKEN": "${SPLUNK_ACCESS_TOKEN}"
          "X-Splunk-Instrumentation-Library": secureapp
      debug:
        verbosity: basic

    connectors:
      routing/logs:
        default_pipelines: [logs]
        table:
          - context: log
            condition: instrumentation_scope.name == "secureapp"
            pipelines: [logs/secureapp]

    service:
      extensions: [headers_setter, health_check]
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resourcedetection]
          exporters: [debug, otlp_http]
        metrics:
          receivers: [host_metrics, kubeletstats, otlp]
          processors: [memory_limiter, batch, resourcedetection]
          exporters: [debug, signalfx]
        metrics/internal:
          receivers: [prometheus/internal]
          processors: [memory_limiter, batch, resourcedetection, resource/add_mode]
          exporters: [signalfx]
        logs/split:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [routing/logs]
        # Non-secureapp OTLP logs (fallback for security events without secureapp scope)
        logs:
          receivers: [routing/logs]
          exporters: [debug, signalfx]
        # SecureApp OTLP logs: library reports -> /v3/event; attack/security events -> signalfx
        logs/secureapp:
          receivers: [routing/logs]
          processors: [memory_limiter, batch]
          exporters: [debug, otlp_http/secureapp, signalfx]

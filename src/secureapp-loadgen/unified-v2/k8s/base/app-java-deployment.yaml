apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-java
  labels:
    app.kubernetes.io/name: app-java
    app.kubernetes.io/language: java
    app.kubernetes.io/part-of: unified-secureapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-java
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-java
        app.kubernetes.io/language: java
        app.kubernetes.io/part-of: unified-secureapp
    spec:
      initContainers:
        - name: wait-for-collector
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for collector (http://collector:13133)..."
              until curl -sf --max-time 3 http://collector:13133/ >/dev/null 2>&1; do
                sleep 2
              done
              echo "Collector ready."
      containers:
        - name: app
          image: secureapp-java-app:local
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              export OTEL_RESOURCE_ATTRIBUTES="service.name=${OTEL_SERVICE_NAME},service.namespace=${OTEL_SERVICE_NAMESPACE},service.version=2.1.3,deployment.environment.name=${DEPLOY_ENV}"
              exec ./entrypoint.sh
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: SPLUNK_PROFILER_ENABLED
              value: "true"
            - name: SPLUNK_PROFILER_MEMORY_ENABLED
              value: "true"
            - name: SPLUNK_PROFILER_LOGS_ENDPOINT
              value: http://collector:4318/v1/logs
            - name: SPLUNK_METRICS_ENABLED
              value: "true"
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -javaagent:/app/splunk-otel-javaagent.jar
                -Dargento.allow.security.events=true
                -Dargento.wait.events.for.first.transaction=false
            - name: ATTACK_HOST
              value: localhost:8080
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-java
                  key: SERVICE_NAME
            - name: OTEL_SERVICE_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-java
                  key: OTEL_SERVICE_NAMESPACE
            - name: DEPLOY_ENV
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: DEPLOY_ENV
            - name: LOADGEN_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-java
                  key: LOADGEN_ENABLED
            - name: LOADGEN_LANGUAGE
              value: java
            - name: FLAGD_HOST
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: FLAGD_HOST
            - name: FLAGD_OFREP_PORT
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: FLAGD_OFREP_PORT
            - name: FLAG_CHECK_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: FLAG_CHECK_INTERVAL
            - name: LOADGEN_PACE
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: LOADGEN_PACE
            - name: ATTACK_ENABLED_SCENARIOS
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: ATTACK_ENABLED_SCENARIOS
            - name: ATTACK_LOOP_START_DELAY_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: ATTACK_LOOP_START_DELAY_SECONDS
            - name: WORKSPACE_SYNC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: WORKSPACE_SYNC_ENABLED
            - name: SHIPPING_ADDR
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-java
                  key: SHIPPING_ADDR
            - name: SHIPPING_API
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-java
                  key: SHIPPING_API
            - name: VA_RUNTIME_MODE
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-java
                  key: VA_RUNTIME_MODE
            - name: VA_STAGGER_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-java
                  key: VA_STAGGER_INTERVAL_SECONDS
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: datagen-node-loop
  labels:
    app.kubernetes.io/name: datagen-node-loop
    app.kubernetes.io/part-of: unified-secureapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: datagen-node-loop
  template:
    metadata:
      labels:
        app.kubernetes.io/name: datagen-node-loop
        app.kubernetes.io/part-of: unified-secureapp
    spec:
      initContainers:
        - name: wait-for-stack
          image: secureapp-loadgen-runner:local
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              until curl -sf --max-time 3 http://app-node:8080/health >/dev/null 2>&1 \
                && curl -sf --max-time 3 http://collector:13133/ >/dev/null 2>&1; do sleep 2; done
      containers:
        - name: datagen
          image: secureapp-loadgen-runner:local
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/loadgen.sh"]
          env:
            - name: APP_BASE_URL
              value: http://app-node:8080
            - name: LOADGEN_LANGUAGE
              value: node
            - name: FLAGD_HOST
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: FLAGD_HOST
            - name: FLAGD_OFREP_PORT
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: FLAGD_OFREP_PORT
            - name: FLAG_CHECK_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: FLAG_CHECK_INTERVAL
            - name: LOADGEN_PACE
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: LOADGEN_PACE
            - name: ATTACK_ENABLED_SCENARIOS
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: ATTACK_ENABLED_SCENARIOS
            - name: ATTACK_LOOP_START_DELAY_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: ATTACK_LOOP_START_DELAY_SECONDS
            - name: WORKSPACE_SYNC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: WORKSPACE_SYNC_ENABLED
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: scripts
          configMap:
            name: datagen-scripts
            defaultMode: 0755

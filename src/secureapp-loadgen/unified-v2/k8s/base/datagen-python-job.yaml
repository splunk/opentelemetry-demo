apiVersion: batch/v1
kind: Job
metadata:
  name: datagen-python-once
  labels:
    app.kubernetes.io/name: datagen-python
    app.kubernetes.io/part-of: unified-secureapp
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: datagen-python
    spec:
      restartPolicy: Never
      containers:
        - name: datagen
          image: secureapp-loadgen-runner:local
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/datagen-once.sh"]
          env:
            - name: APP_BASE_URL
              value: http://app-python:8080
            - name: LOADGEN_LANGUAGE
              value: python
            - name: ATTACK_ENABLED_SCENARIOS
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: ATTACK_ENABLED_SCENARIOS
            - name: WORKSPACE_SYNC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: secureapp-config-shared
                  key: WORKSPACE_SYNC_ENABLED
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: scripts
          configMap:
            name: datagen-scripts
            defaultMode: 0755

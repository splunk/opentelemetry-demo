# Kubernetes manifest for planning
# Planning service: consumes orders from Kafka, calls Lambda periodically
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planning
  labels:
    opentelemetry.io/name: planning
    app.kubernetes.io/component: planning
    app.kubernetes.io/name: planning
    app.kubernetes.io/version: 1.8.0
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: planning
  template:
    metadata:
      labels:
        opentelemetry.io/name: planning
        app.kubernetes.io/component: planning
        app.kubernetes.io/name: planning
    spec:
      serviceAccountName: opentelemetry-demo
      # DNS Configuration to prevent stale DNS caching
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: ndots
            value: "2"
          - name: timeout
            value: "2"
          - name: attempts
            value: "3"
      containers:
      - name: planning
        image: ghcr.io/splunk/opentelemetry-demo/otel-planning:1.8.0
        imagePullPolicy: Always
        env:
        - name: OTEL_SERVICE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/component']
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_COLLECTOR_NAME
          value: $(NODE_IP)
        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative
        # Kafka configuration
        - name: KAFKA_ADDR
          value: kafka:9092
        - name: KAFKA_TOPIC
          value: orders
        - name: KAFKA_GROUP_ID
          value: planning
        # Lambda configuration
        - name: LAMBDA_ENDPOINT
          value: "https://61d4vss237.execute-api.eu-west-1.amazonaws.com/demo/orders"
        - name: LAMBDA_CALL_INTERVAL_MINUTES
          value: "5"
        # OpenTelemetry configuration
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4317
        - name: OTEL_PYTHON_LOG_CORRELATION
          value: 'true'
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=1.8.0,service.kafka=spanlink
        # Splunk profiler
        - name: SPLUNK_PROFILER_ENABLED
          value: 'true'
        - name: SPLUNK_PROFILER_LOGS_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4317
        - name: SPLUNK_PROFILER_CALL_STACK_INTERVAL
          value: '750'
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;
        image: busybox:latest
        name: wait-for-kafka

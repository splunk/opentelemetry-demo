# Fraud Detection Standalone Kubernetes Manifest
# Version: 2.1.3
#
# Deploys fraud-detection with minimal dependencies for standalone DBMon testing.
# Includes: service-account, kafka, sql-server-fraud (+ setup), flagd (+ config), fraud-detection
#
# Usage:
#   kubectl apply -f test/fraud-standalone/fraud-standalone-manifest.yaml -n fraud-test
#
# To generate Kafka messages for testing without full checkout stack, use:
#   kubectl run kafka-producer --rm -it --image=ghcr.io/open-telemetry/demo:2.2.0-kafka \
#     -- kafka-console-producer.sh --broker-list kafka:9092 --topic orders
---

# === demo-service-account ===
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opentelemetry-demo
  labels:
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo

---
# === sql-server-fraud-setup (secrets + init script) ===
apiVersion: v1
kind: Secret
metadata:
  name: mssql-secrets
type: Opaque
stringData:
  SA_PASSWORD: ChangeMe_SuperStrong123!
  DB_CONNECTION_STRING: Server=tcp:sql-server-fraud.fraud-test.svc.cluster.local,1433;Database=FraudDetection;User
    Id=sa;Password=ChangeMe_SuperStrong123!;Encrypt=True;TrustServerCertificate=True
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mssql-init-script
data:
  init-db.sql: |
    IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'FraudDetection')
    BEGIN
      CREATE DATABASE FraudDetection;
    END
    GO

---
# === sql-server-fraud ===
apiVersion: v1
kind: Service
metadata:
  name: sql-server-fraud
spec:
  type: ClusterIP
  ports:
  - port: 1433
    targetPort: 1433
    protocol: TCP
    name: tds
  selector:
    app: sql-server-fraud
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sql-server-fraud
spec:
  serviceName: sql-server-fraud
  replicas: 1
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  selector:
    matchLabels:
      app: sql-server-fraud
  template:
    metadata:
      annotations:
        splunk.com/monitor: sqlserver
        splunk.com/sqlserver.database: fraud
      labels:
        app: sql-server-fraud
    spec:
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2022-latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1433
          name: tds
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: MSSQL_PID
          value: Express
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql-secrets
              key: SA_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /var/opt/mssql
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/bash
              - -c
              - 'sleep 30

                /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}"
                -C -i /docker-entrypoint-initdb.d/init-db.sql

                '
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: '1'
            memory: 2Gi
        readinessProbe:
          tcpSocket:
            port: 1433
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 1433
          initialDelaySeconds: 30
          periodSeconds: 20
      volumes:
      - name: init-script
        configMap:
          name: mssql-init-script
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi

---
# === kafka ===
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    opentelemetry.io/name: kafka
    app.kubernetes.io/component: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  type: ClusterIP
  ports:
  - port: 9092
    name: plaintext
    targetPort: 9092
  - port: 9093
    name: controller
    targetPort: 9093
  selector:
    opentelemetry.io/name: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    opentelemetry.io/name: kafka
    app.kubernetes.io/component: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: kafka
  template:
    metadata:
      labels:
        opentelemetry.io/name: kafka
        app.kubernetes.io/component: kafka
        app.kubernetes.io/name: kafka
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
      - name: kafka
        image: ghcr.io/open-telemetry/demo:2.2.0-kafka
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9092
          name: plaintext
        - containerPort: 9093
          name: controller
        env:
        - name: OTEL_SERVICE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/component']
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_COLLECTOR_NAME
          value: $(NODE_IP)
        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative
        - name: KAFKA_ADVERTISED_LISTENERS
          value: PLAINTEXT://kafka:9092
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4318
        - name: KAFKA_HEAP_OPTS
          value: -Xmx400M -Xms400M
        - name: KAFKA_LISTENERS
          value: PLAINTEXT://:9092,CONTROLLER://:9093
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: CONTROLLER
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: 1@kafka:9093
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=2.1.3,service.kafka=no
        resources:
          limits:
            memory: 800Mi
        securityContext:
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000

---
# === flagd-config (PVC + ConfigMap) ===
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flagd-shared-config
  labels:
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/component: flagd
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  storageClassName: local-path
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flagd-config
  labels:
    app.kubernetes.io/part-of: opentelemetry-demo
data:
  demo.flagd.json: |
    {
      "$schema": "https://flagd.dev/schema/v0/flags.json",
      "flags": {
        "kafkaQueueProblems": {
          "description": "Overloads Kafka queue while simultaneously introducing a consumer side delay leading to a lag spike",
          "state": "ENABLED",
          "variants": {
            "on": 100,
            "off": 0
          },
          "defaultVariant": "off"
        }
      }
    }

---
# === flagd ===
apiVersion: v1
kind: Service
metadata:
  name: flagd
  labels:
    opentelemetry.io/name: flagd
    app.kubernetes.io/component: flagd
    app.kubernetes.io/name: flagd
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  type: ClusterIP
  ports:
  - port: 8013
    name: rpc
    targetPort: 8013
  - port: 8016
    name: ofrep
    targetPort: 8016
  selector:
    opentelemetry.io/name: flagd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagd
  labels:
    opentelemetry.io/name: flagd
    app.kubernetes.io/component: flagd
    app.kubernetes.io/name: flagd
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: flagd
  template:
    metadata:
      labels:
        opentelemetry.io/name: flagd
        app.kubernetes.io/component: flagd
        app.kubernetes.io/name: flagd
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
      - name: flagd
        image: ghcr.io/open-feature/flagd:v0.14.2
        imagePullPolicy: IfNotPresent
        command:
        - /flagd-build
        - start
        - --port
        - '8013'
        - --ofrep-port
        - '8016'
        - --uri
        - file:./etc/flagd/demo.flagd.json
        ports:
        - containerPort: 8013
          name: rpc
        - containerPort: 8016
          name: ofrep
        env:
        - name: GOMEMLIMIT
          value: 60MiB
        resources:
          limits:
            memory: 75Mi
        volumeMounts:
        - name: config-rw
          mountPath: /etc/flagd
      initContainers:
      - command:
        - sh
        - -c
        - cp /config-ro/demo.flagd.json /config-rw/demo.flagd.json && cat /config-rw/demo.flagd.json
        image: busybox
        name: init-config
        volumeMounts:
        - mountPath: /config-ro
          name: config-ro
        - mountPath: /config-rw
          name: config-rw
      volumes:
      - name: config-rw
        persistentVolumeClaim:
          claimName: flagd-shared-config
      - configMap:
          name: flagd-config
        name: config-ro

---
# === fraud-detection ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection
  labels:
    opentelemetry.io/name: fraud-detection
    app.kubernetes.io/component: fraud-detection
    app.kubernetes.io/name: fraud-detection
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: fraud-detection
  template:
    metadata:
      labels:
        opentelemetry.io/name: fraud-detection
        app.kubernetes.io/component: fraud-detection
        app.kubernetes.io/name: fraud-detection
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
      - name: fraud-detection
        image: ghcr.io/splunk/opentelemetry-demo/otel-fraud-detection:2.0.0
        imagePullPolicy: Always
        env:
        - name: OTEL_SERVICE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/component']
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_COLLECTOR_NAME
          value: $(NODE_IP)
        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative
        - name: KAFKA_ADDR
          value: kafka:9092
        - name: FLAGD_HOST
          value: flagd
        - name: FLAGD_PORT
          value: '8013'
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4318
        - name: OTEL_INSTRUMENTATION_KAFKA_CLIENTS_ENABLED
          value: 'false'
        - name: OTEL_INSTRUMENTATION_SPLUNK_JDBC_ENABLED
          value: 'true'
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=2.1.3,service.kafka=propagation
        - name: SQL_SERVER_HOST
          value: sql-server-fraud
        - name: SQL_SERVER_PORT
          value: '1433'
        - name: SQL_SERVER_DATABASE
          value: FraudDetection
        - name: SQL_SERVER_USER
          value: sa
        - name: SQL_SERVER_PASSWORD
          value: ChangeMe_SuperStrong123!
        - name: FRAUD_DETECTION_RATE
          value: '80'
        - name: CLEANUP_RETENTION_DAYS
          value: '7'
        - name: CLEANUP_INTERVAL_HOURS
          value: '24'
        - name: FRAUD_MUTATION_PERCENTAGE
          value: '25'
        - name: BAD_QUERY_PERCENTAGE
          value: '0'
        resources:
          limits:
            memory: 1Gi
          requests:
            memory: 512Mi
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;
        image: busybox:latest
        name: wait-for-kafka
      - command:
        - sh
        - -c
        - until nc -z -v -w30 sql-server-fraud 1433; do echo waiting for sql-server-fraud;
          sleep 2; done;
        image: busybox:latest
        name: wait-for-sqlserver

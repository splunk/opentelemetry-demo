# Splunk OTel Collector Helm values for dc-shim standalone testing.
# Only includes receivers/processors relevant to shop-dc-shim + its SQL Server.
#
# Usage:
#   helm install splunk-otel-collector splunk-otel-collector-chart/splunk-otel-collector \
#     --namespace dc-shim-test \
#     --values test/dc-shim-standalone/dc-shim-standalone-values.yaml \
#     --set splunkObservability.realm=<REALM> \
#     --set splunkObservability.accessToken=<TOKEN> \
#     --set clusterName=<CLUSTER>

clusterReceiver:
  extraEnvs:
  - name: WORKSHOP_REALM
    valueFrom:
      secretKeyRef:
        name: workshop-secret
        key: realm
  - name: WORKSHOP_ENVIRONMENT
    valueFrom:
      secretKeyRef:
        name: workshop-secret
        key: instance
  eventsEnabled: true

agent:
  extraEnvs:
  - name: WORKSHOP_REALM
    valueFrom:
      secretKeyRef:
        name: workshop-secret
        key: realm
  - name: WORKSHOP_ENVIRONMENT
    valueFrom:
      secretKeyRef:
        name: workshop-secret
        key: instance
  config:
    receivers:
      receiver_creator:
        watch_observers: [k8s_observer]
        receivers:
          sqlserver/shopshim:
            rule: type == "port" && pod.name matches "shop-dc-shim-db" && port == 1433
            config:
              collection_interval: 10s
              top_query_collection:
                lookback_time: 300s
              username: sa
              password: ShopPass123!
              server: '`host`'
              port: 1433
              resource_attributes:
                sqlserver.instance.name:
                  enabled: true
              events:
                db.server.query_sample:
                  enabled: true
                db.server.top_query:
                  enabled: true
              metrics:
                sqlserver.batch.request.rate:
                  enabled: true
                sqlserver.batch.sql_compilation.rate:
                  enabled: true
                sqlserver.batch.sql_recompilation.rate:
                  enabled: true
                sqlserver.database.count:
                  enabled: true
                sqlserver.database.io:
                  enabled: true
                sqlserver.database.latency:
                  enabled: true
                sqlserver.database.operations:
                  enabled: true
                sqlserver.deadlock.rate:
                  enabled: true
                sqlserver.lock.wait.count:
                  enabled: true
                sqlserver.lock.wait.rate:
                  enabled: true
                sqlserver.os.wait.duration:
                  enabled: true
                sqlserver.page.buffer_cache.hit_ratio:
                  enabled: true
                sqlserver.processes.blocked:
                  enabled: true
                sqlserver.resource_pool.disk.operations:
                  enabled: true
                sqlserver.resource_pool.disk.throttled.read.rate:
                  enabled: true
                sqlserver.resource_pool.disk.throttled.write.rate:
                  enabled: true
                sqlserver.user.connection.count:
                  enabled: true
    exporters:
      otlphttp/dbmon:
        headers:
          X-SF-Token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN}
          X-splunk-instrumentation-library: dbmon
        logs_endpoint: https://ingest.${WORKSHOP_REALM}.signalfx.com/v3/event
        sending_queue:
          batch:
            flush_timeout: 15s
            max_size: 10485760
            sizer: bytes
    processors:
      resource/add_environment:
        attributes:
          - key: deployment.environment
            value: ${WORKSHOP_ENVIRONMENT}
            action: insert
      transform/dc_not_error:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - set(status.code, STATUS_CODE_UNSET) where attributes["response_flags"] == "DC"
              - set(attributes["error"], "false") where attributes["response_flags"] == "DC"
              - set(name, Concat([name, " (user navigated away)"], "")) where attributes["response_flags"] == "DC"
              - set(status.code, STATUS_CODE_UNSET) where attributes["canceled"] == "true"
              - set(attributes["error"], "false") where attributes["canceled"] == "true"
              - set(name, Concat([name, " (backend interaction terminated due to client disconnect)"], "")) where attributes["canceled"] == "true"
      transform/dbmon:
        error_mode: ignore
        metric_statements:
          - conditions:
              - resource.attributes["sqlserver.instance.name"] != nil
            statements:
              - set(resource.attributes["service.instance.id"], Concat([resource.attributes["deployment.environment"], " - ", resource.attributes["sqlserver.instance.name"]], ""))
        log_statements:
          - conditions:
              - resource.attributes["sqlserver.instance.name"] != nil
            statements:
              - set(resource.attributes["service.instance.id"], Concat([resource.attributes["deployment.environment"], " - ", resource.attributes["sqlserver.instance.name"]], ""))

    service:
      pipelines:
        metrics:
          exporters: [signalfx]
          processors: [memory_limiter, k8sattributes, batch, resourcedetection, resource, resource/add_environment, transform/dbmon]
          receivers: [hostmetrics, kubeletstats, otlp, receiver_creator]
        traces:
          exporters: [signalfx, otlphttp]
          processors: [memory_limiter, transform/dc_not_error, k8sattributes, batch, resourcedetection, resource, resource/add_environment]
          receivers: [otlp, jaeger, zipkin]
        logs/dbmon:
          receivers: [receiver_creator]
          processors: [memory_limiter, batch, resourcedetection, resource, resource/add_environment, transform/dbmon]
          exporters: [otlphttp/dbmon]

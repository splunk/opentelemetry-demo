# Minimal test deployment for Payment A/B and Checkout
# This deploys only the three changed services for testing
#
# Prerequisites:
#   - Existing namespace with opentelemetry-demo ServiceAccount
#   - Flagd service (for feature flags)
#   - OpenTelemetry Collector endpoint
#   - Dependent services (cart, currency, email, product-catalog, shipping, kafka)
#
# Deploy: kubectl apply -f test-payment-ab-deployment.yaml
# Delete: kubectl delete -f test-payment-ab-deployment.yaml

---
# Payment Version A Secret
apiVersion: v1
kind: Secret
metadata:
  name: payment-va-secret
  labels:
    app: payment
    version: vA
type: Opaque
stringData:
  api-token: "prod-a8cf28f9-1a1a-4994-bafa-cd4b143c3291"

---
# Payment Version B Secret
apiVersion: v1
kind: Secret
metadata:
  name: payment-vb-secret
  labels:
    app: payment
    version: vB
type: Opaque
stringData:
  api-token: "test-20e26e90-356b-432e-a2c6-956fc03f5609"

---
# Payment Version A Service
apiVersion: v1
kind: Service
metadata:
  name: payment-va
  labels:
    app: payment
    version: vA
    app.kubernetes.io/component: payment
    app.kubernetes.io/name: payment-va
spec:
  type: ClusterIP
  ports:
  - port: 8080
    name: grpc
    targetPort: 8080
    protocol: TCP
  selector:
    app: payment
    version: vA

---
# Payment Version B Service
apiVersion: v1
kind: Service
metadata:
  name: payment-vb
  labels:
    app: payment
    version: vB
    app.kubernetes.io/component: payment
    app.kubernetes.io/name: payment-vb
spec:
  type: ClusterIP
  ports:
  - port: 8080
    name: grpc
    targetPort: 8080
    protocol: TCP
  selector:
    app: payment
    version: vB

---
# Checkout Service
apiVersion: v1
kind: Service
metadata:
  name: checkout
  labels:
    app.kubernetes.io/component: checkout
    app.kubernetes.io/name: checkout
spec:
  type: ClusterIP
  ports:
  - port: 8080
    name: tcp-service
    targetPort: 8080
  selector:
    app.kubernetes.io/component: checkout

---
# Payment Version A Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-va
  labels:
    app: payment
    version: vA
    app.kubernetes.io/component: payment
    app.kubernetes.io/name: payment-va
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
      version: vA
  template:
    metadata:
      labels:
        app: payment
        version: vA
        app.kubernetes.io/component: payment
        app.kubernetes.io/name: payment-va
    spec:
      serviceAccountName: opentelemetry-demo

      # Anti-affinity - don't run on same node as version B
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: payment
                  version: vB
              topologyKey: kubernetes.io/hostname

      containers:
      - name: payment
        image: ghcr.io/hagen-p/opentelemetry-demo-splunk/otel-payment:test-1.7-a
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: grpc
          protocol: TCP

        env:
        # Version configuration
        - name: PAYMENT_VERSION
          value: "vA"

        # Token from secret
        - name: PAYMENT_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: payment-va-secret
              key: api-token

        # Service configuration
        - name: PAYMENT_PORT
          value: "8080"

        # OpenTelemetry service name
        - name: OTEL_SERVICE_NAME
          value: "payment-va"

        # Feature flags
        - name: FLAGD_HOST
          value: flagd
        - name: FLAGD_PORT
          value: "8013"

        # Get node IP for collector
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_COLLECTOR_NAME
          value: $(NODE_IP)

        # OpenTelemetry collector endpoint
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4317

        # Resource attributes
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=payment-va,service.version=1.7.0-a,payment.variant=A,deployment.stability=stable"

        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 120Mi
            cpu: 200m

---
# Payment Version B Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-vb
  labels:
    app: payment
    version: vB
    app.kubernetes.io/component: payment
    app.kubernetes.io/name: payment-vb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
      version: vB
  template:
    metadata:
      labels:
        app: payment
        version: vB
        app.kubernetes.io/component: payment
        app.kubernetes.io/name: payment-vb
    spec:
      serviceAccountName: opentelemetry-demo

      # Anti-affinity - don't run on same node as version A
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: payment
                  version: vA
              topologyKey: kubernetes.io/hostname

      containers:
      - name: payment
        image: ghcr.io/hagen-p/opentelemetry-demo-splunk/otel-payment:test-1.7-b
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: grpc
          protocol: TCP

        env:
        # Version configuration
        - name: PAYMENT_VERSION
          value: "vB"

        # Token from secret
        - name: PAYMENT_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: payment-vb-secret
              key: api-token

        # Service configuration
        - name: PAYMENT_PORT
          value: "8080"

        # OpenTelemetry service name
        - name: OTEL_SERVICE_NAME
          value: "payment-vb"

        # Feature flags
        - name: FLAGD_HOST
          value: flagd
        - name: FLAGD_PORT
          value: "8013"

        # Get node IP for collector
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_COLLECTOR_NAME
          value: $(NODE_IP)

        # OpenTelemetry collector endpoint
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4317

        # Resource attributes
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=payment-vb,service.version=1.7.0-b,payment.variant=B,deployment.stability=canary"

        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 120Mi
            cpu: 200m

---
# Checkout Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  labels:
    app.kubernetes.io/component: checkout
    app.kubernetes.io/name: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: checkout
  template:
    metadata:
      labels:
        app.kubernetes.io/component: checkout
        app.kubernetes.io/name: checkout
    spec:
      serviceAccountName: opentelemetry-demo

      containers:
      - name: checkout
        image: ghcr.io/hagen-p/opentelemetry-demo-splunk/otel-checkout:test-1.7
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: service

        env:
        # Service name
        - name: OTEL_SERVICE_NAME
          value: checkout

        # Get node IP for collector
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_COLLECTOR_NAME
          value: $(NODE_IP)

        # Checkout configuration
        - name: CHECKOUT_PORT
          value: '8080'
        - name: CART_ADDR
          value: cart:8080
        - name: CURRENCY_ADDR
          value: currency:8080
        - name: EMAIL_ADDR
          value: http://email:8080
        - name: PRODUCT_CATALOG_ADDR
          value: product-catalog:8080
        - name: SHIPPING_ADDR
          value: http://shipping:8080
        - name: KAFKA_ADDR
          value: kafka:9092

        # Feature flags
        - name: FLAGD_HOST
          value: flagd
        - name: FLAGD_PORT
          value: '8013'

        # OpenTelemetry collector endpoint
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4317
        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative

        # Resource attributes
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=test-1.7

        # Resource limits
        - name: GOMEMLIMIT
          value: 16MiB

        resources:
          limits:
            memory: 20Mi




clusterReceiver:
  extraEnvs:
  - name: WORKSHOP_REALM
    valueFrom:
      secretKeyRef:
        name: workshop-secret
        key: realm
  - name: WORKSHOP_ENVIRONMENT
    valueFrom:
      secretKeyRef:
        name: workshop-secret
        key: instance
  # Disabled eventsEnabled and k8sObjects - these generate non-HEC data
  # that gets refused by Splunk Platform endpoints
  eventsEnabled: false
  k8sObjects: []
  config:
    receivers:
      # Using receiver_creator to dynamically create receivers when services are ready
      # This prevents connection errors when databases are still starting up
      receiver_creator:
        watch_observers: [k8s_observer]
        receivers:
          # SQL Server for Shop DC Shim - only created when pod is ready
          # Uses type == "pod.container" because endpoint gives just the IP (not IP:port)
          # SQL Server receiver needs separate server and port fields
          sqlserver/shopshim:
            rule: type == "pod.container" && pod.name matches "shop-dc-shim-db"
            config:
              collection_interval: 10s
              top_query_collection:
                lookback_time: 300s
              username: sa
              password: ShopPass123!
              server: '`endpoint`'
              port: 1433
              resource_attributes:
                sqlserver.instance.name:
                  enabled: true
              events:
                db.server.query_sample:
                  enabled: true
                db.server.top_query:
                  enabled: true
              metrics:
                sqlserver.batch.request.rate:
                    enabled: true
                sqlserver.batch.sql_compilation.rate:
                    enabled: true
                sqlserver.batch.sql_recompilation.rate:
                    enabled: true
                sqlserver.database.count:
                    enabled: true
                sqlserver.database.io:
                    enabled: true
                sqlserver.database.latency:
                    enabled: true
                sqlserver.database.operations:
                    enabled: true
                sqlserver.deadlock.rate:
                    enabled: true
                sqlserver.lock.wait.count:
                    enabled: true
                sqlserver.lock.wait.rate:
                    enabled: true
                sqlserver.os.wait.duration:
                    enabled: true
                sqlserver.page.buffer_cache.hit_ratio:
                    enabled: true
                sqlserver.processes.blocked:
                    enabled: true
                sqlserver.resource_pool.disk.operations:
                    enabled: true
                sqlserver.resource_pool.disk.throttled.read.rate:
                    enabled: true
                sqlserver.resource_pool.disk.throttled.write.rate:
                    enabled: true
                sqlserver.user.connection.count:
                    enabled: true
          # SQL Server for Fraud Detection - only created when pod is ready
          # Uses type == "pod.container" because endpoint gives just the IP (not IP:port)
          # SQL Server receiver needs separate server and port fields
          sqlserver/fraud:
            rule: type == "pod.container" && pod.name matches "sql-server-fraud"
            config:
              collection_interval: 10s
              top_query_collection:
                lookback_time: 120s
              username: sa
              password: "ChangeMe_SuperStrong123!"
              server: '`endpoint`'
              port: 1433
              resource_attributes:
                sqlserver.instance.name:
                  enabled: true
              events:
                db.server.query_sample:
                  enabled: true
                db.server.top_query:
                  enabled: true
              metrics:
                sqlserver.batch.request.rate:
                    enabled: true
                sqlserver.batch.sql_compilation.rate:
                    enabled: true
                sqlserver.batch.sql_recompilation.rate:
                    enabled: true
                sqlserver.database.count:
                    enabled: true
                sqlserver.database.io:
                    enabled: true
                sqlserver.database.latency:
                    enabled: true
                sqlserver.database.operations:
                    enabled: true
                sqlserver.deadlock.rate:
                    enabled: true
                sqlserver.lock.wait.count:
                    enabled: true
                sqlserver.lock.wait.rate:
                    enabled: true
                sqlserver.os.wait.duration:
                    enabled: true
                sqlserver.page.buffer_cache.hit_ratio:
                    enabled: true
                sqlserver.processes.blocked:
                    enabled: true
                sqlserver.resource_pool.disk.operations:
                    enabled: true
                sqlserver.resource_pool.disk.throttled.read.rate:
                    enabled: true
                sqlserver.resource_pool.disk.throttled.write.rate:
                    enabled: true
                sqlserver.user.connection.count:
                    enabled: true
                sqlserver.database.latency:
                  enabled: true
          # PostgreSQL for Main Database - only created when pod is ready
          # Uses type == "port" for more precise endpoint matching
          # Database name is read dynamically from pod annotation
          # Note: PostgreSQL endpoint format is host:port which works with `endpoint`
          postgresql/main:
            rule: type == "port" && pod.name matches "postgres" && port == 5432
            config:
              endpoint: '`endpoint`'
              transport: tcp
              username: root
              password: otel
              databases: '`pod.annotations["splunk.com/postgresql.database"]`'
              tls:
                insecure: true
              collection_interval: 10s
              resource_attributes:
                postgresql.database.name:
                  enabled: true
              events:
                db.server.query_sample:
                  enabled: true
                db.server.top_query:
                  enabled: true
                metrics:
                postgresql.commits:
                  enabled: true
                postgresql.operations:
                  enabled: true   
                postgresql.deadlocks:
                  enabled: true   
                postgresql.connection.max:
                  enabled: true
    extensions:
      # K8s Observer watches for pod endpoints - required for receiver_creator
      k8s_observer:
        auth_type: serviceAccount
        observe_pods: true
        observe_nodes: false
    exporters:
      # Exports dbmon events as logs
      otlphttp/dbmon:
        headers:
          X-SF-Token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN}
          X-splunk-instrumentation-library: dbmon
        logs_endpoint: https://ingest.${WORKSHOP_REALM}.signalfx.com/v3/event
        sending_queue:
          batch:
            flush_timeout: 15s
            max_size: 10485760 # 10 MiB
            sizer: bytes
    processors:
      # Inject environment as a resource attribute for use in transforms
      resource/add_environment:
        attributes:
          - key: deployment.environment
            value: ${WORKSHOP_ENVIRONMENT}
            action: upsert
      transform/dbmon:
        error_mode: ignore
        metric_statements:
          # SQL Server: use instance name for identification (-S- marker)
          - conditions:
              - resource.attributes["sqlserver.instance.name"] != nil
            statements:
              - set(resource.attributes["service.instance.id"], Concat([resource.attributes["deployment.environment"], " -S- ", resource.attributes["sqlserver.instance.name"]], ""))
          # PostgreSQL database-level metrics: use database name for identification (-D- marker)
          - conditions:
              - resource.attributes["postgresql.database.name"] != nil
            statements:
              - set(resource.attributes["service.instance.id"], Concat([resource.attributes["deployment.environment"], " -D- ", resource.attributes["postgresql.database.name"]], ""))
          # PostgreSQL instance-level metrics: use instance name for identification (-I- marker)
          - conditions:
              - resource.attributes["postgresql.instance.name"] != nil
            statements:
              - set(resource.attributes["service.instance.id"], Concat([resource.attributes["deployment.environment"], " -I- ", resource.attributes["postgresql.instance.name"]], ""))
        log_statements:
          # SQL Server: use instance name for identification (-S- marker)
          - conditions:
              - resource.attributes["sqlserver.instance.name"] != nil
            statements:
              - set(resource.attributes["service.instance.id"], Concat([resource.attributes["deployment.environment"], " -S- ", resource.attributes["sqlserver.instance.name"]], ""))
          # PostgreSQL database-level metrics: use database name for identification (-D- marker)
          - conditions:
              - resource.attributes["postgresql.database.name"] != nil
            statements:
              - set(resource.attributes["service.instance.id"], Concat([resource.attributes["deployment.environment"], " -D- ", resource.attributes["postgresql.database.name"]], ""))
          # PostgreSQL instance-level logs: use instance name for identification (-I- marker)
          - conditions:
              - resource.attributes["postgresql.instance.name"] != nil
            statements:
              - set(resource.attributes["service.instance.id"], Concat([resource.attributes["deployment.environment"], " -I- ", resource.attributes["postgresql.instance.name"]], ""))
    service:
      extensions: [health_check, k8s_observer]
      pipelines:
        metrics:
          exporters: [signalfx]
          processors: [memory_limiter, batch, resourcedetection, resource, resource/k8s_cluster, resource/add_collector_k8s, resource/add_environment, transform/dbmon]
          receivers: [k8s_cluster, receiver_creator]
        logs/dbmon:
          receivers:
            - receiver_creator
          processors:
            - memory_limiter
            - batch
            - resourcedetection
            - resource
            - resource/add_collector_k8s
            - resource/add_environment
            - transform/dbmon
          exporters:
            - otlphttp/dbmon
agent:
  extraEnvs:
  - name: WORKSHOP_ENVIRONMENT
    valueFrom:
      secretKeyRef:
        name: workshop-secret
        key: instance
  config:
    receivers:
      receiver_creator:
        receivers:
          mysql/online-boutique:
            rule: type == "port" && pod.name matches "mysql" && port == 3306
            config:
              tls:
                insecure: true
              username: root
              password: root
              database: LxvGChW075
          redis:
           rule: type == "port" && pod.name matches "redis-cart" && port == 6379
           config:
             endpoint: "redis-cart:6379"
             collection_interval: 10s
    processors:
      # Inject environment as a resource attribute for traces
      resource/add_environment:
        attributes:
          - key: deployment.environment
            value: ${WORKSHOP_ENVIRONMENT}
            action: upsert
      filter/drop_flagd:
        traces:
          span:
          - attributes["rpc.method"] == "EventStream"
          - attributes["rpc.method"] == "ResolveAll"
          - attributes["rpc.method"] == "ResolveBoolean"
          - attributes["rpc.method"] == "ResolveFloat"
          - attributes["rpc.method"] == "ResolveInt"
          - attributes["http.url"] == "http://flagd:8016/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
          - attributes["url.full"] == "http://flagd:8013/flagd.evaluation.v1.Service/ResolveBoolean"
          - attributes["otel.scope.name"] == "flagd.evaluation.v1"
          - attributes["url.full"] == "http://flagd:8013/flagd.evaluation.v1.Service/EventStream"
      transform/dc_not_error:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # Treat "DC" (Downstream Connection closed) as normal, not error
              # This happens when users navigate away before response completes
              - set(status.code, STATUS_CODE_UNSET) where attributes["response_flags"] == "DC"
              - set(attributes["error"], "false") where attributes["response_flags"] == "DC"
              - set(name, Concat([name, " (user navigated away)"], "")) where attributes["response_flags"] == "DC"
              # Also handle egress cancellations (proxy cancels outbound when client disconnects)
              - set(status.code, STATUS_CODE_UNSET) where attributes["canceled"] == "true"
              - set(attributes["error"], "false") where attributes["canceled"] == "true"
              - set(name, Concat([name, " (backend interaction terminated due to client disconnect)"], "")) where attributes["canceled"] == "true"

    service:
      pipelines:
        metrics:
          exporters: [signalfx]
          processors: [memory_limiter, k8sattributes, batch, resourcedetection, resource]
          receivers: [hostmetrics, kubeletstats, otlp, receiver_creator]
        traces:
          exporters: [signalfx, otlphttp]
          processors: [memory_limiter,  filter/drop_flagd, transform/dc_not_error, k8sattributes, batch, resourcedetection, resource, resource/add_environment]
          receivers: [otlp, jaeger, zipkin]

logsCollection:
  extraFileLogs:
    filelog/syslog:
      include: [/var/log/syslog]
      include_file_path: true
      include_file_name: false
      resource:
        com.splunk.source: /var/log/syslog
        host.name: 'EXPR(env("K8S_NODE_NAME"))'
        com.splunk.sourcetype: syslog
    filelog/auth_log:
      include: [/var/log/auth.log]
      include_file_path: true
      include_file_name: false
      resource:
        com.splunk.source: /var/log/auth.log
        host.name: 'EXPR(env("K8S_NODE_NAME"))'
        com.splunk.sourcetype: auth_log

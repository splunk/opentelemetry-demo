name: Astronomy Shop - Promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g. 1.7.2)"
        required: true
      scope:
        description: "Scope (all | prod | diab)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - prod
          - diab
      dry_run:
        description: "Dry run (validate only, no copy to target repo)"
        required: false
        type: boolean
        default: false
      update_workshop:
        description: "Update workshop instance (splunk/observability-workshop under workshop/k3s/)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    # Only run in the main splunk/opentelemetry-demo repo, not in forks
    if: github.repository == 'splunk/opentelemetry-demo'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v5

      - name: Check deploy token
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          DEPLOY_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "::error::GHCR_TOKEN secret is not configured. Please add it to repository secrets."
            echo "The token needs 'repo' scope to push to splunk/o11y-field-demos"
            exit 1
          fi
          echo "GHCR_TOKEN secret is configured"

      - name: Checkout target repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/checkout@v5
        with:
          repository: splunk/o11y-field-demos
          token: ${{ secrets.GHCR_TOKEN }}
          path: target

      - name: Checkout workshop repo
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.update_workshop == 'true' }}
        uses: actions/checkout@v5
        with:
          repository: splunk/observability-workshop
          token: ${{ secrets.GHCR_TOKEN }}
          path: target-workshop

      - name: Set variables
        id: vars
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SCOPE="${{ github.event.inputs.scope }}"

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SCOPE=${SCOPE}" >> $GITHUB_ENV

          # Values file lives in the repo
          VALUES="kubernetes/splunk-astronomy-shop-${VERSION}-values.yaml"
          echo "VALUES=${VALUES}" >> $GITHUB_ENV

          # Manifest filenames (downloaded from release assets)
          DOWNLOAD_DIR="release-assets"
          echo "DOWNLOAD_DIR=${DOWNLOAD_DIR}" >> $GITHUB_ENV

          echo "MANIFEST=${DOWNLOAD_DIR}/splunk-astronomy-shop-${VERSION}.yaml" >> $GITHUB_ENV
          echo "MANIFEST_DIAB=${DOWNLOAD_DIR}/splunk-astronomy-shop-${VERSION}-diab.yaml" >> $GITHUB_ENV
          echo "MANIFEST_LAMBDA=${DOWNLOAD_DIR}/splunk-astronomy-shop-${VERSION}-lambda.yaml" >> $GITHUB_ENV
          echo "MANIFEST_DC_SHIM=${DOWNLOAD_DIR}/splunk-astronomy-shop-${VERSION}-dc-shim.yaml" >> $GITHUB_ENV
          echo "MANIFEST_SECUREAPP=${DOWNLOAD_DIR}/splunk-astronomy-shop-${VERSION}-secureapp.yaml" >> $GITHUB_ENV
          echo "MANIFEST_THROTTLE_DEMO=${DOWNLOAD_DIR}/splunk-astronomy-shop-${VERSION}-throttle-demo.yaml" >> $GITHUB_ENV

          echo "### Selected Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | ${SCOPE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release tag | \`v${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Download manifests from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$DOWNLOAD_DIR"

          echo "### Release Assets Download" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check release exists
          if ! gh release view "v${VERSION}" --json tagName -q .tagName > /dev/null 2>&1; then
            echo "::error::Release v${VERSION} not found"
            echo "❌ **Release \`v${VERSION}\` not found**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Available releases:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            gh release list --limit 10 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ Release \`v${VERSION}\` found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Download all manifest assets from the release
          echo "Downloading assets from release v${VERSION}..."
          gh release download "v${VERSION}" \
            --pattern "splunk-astronomy-shop-*.yaml" \
            --dir "$DOWNLOAD_DIR" || true

          echo "| Asset | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          for FILE in \
            "splunk-astronomy-shop-${VERSION}.yaml" \
            "splunk-astronomy-shop-${VERSION}-diab.yaml" \
            "splunk-astronomy-shop-${VERSION}-lambda.yaml" \
            "splunk-astronomy-shop-${VERSION}-dc-shim.yaml" \
            "splunk-astronomy-shop-${VERSION}-secureapp.yaml" \
            "splunk-astronomy-shop-${VERSION}-throttle-demo.yaml"; do
            if [ -f "${DOWNLOAD_DIR}/${FILE}" ]; then
              echo "| \`${FILE}\` | ✅ Downloaded |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`${FILE}\` | ℹ️ Not in release |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Verify values.yaml exists (required)
        run: |
          echo "### Values File Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$VALUES" ]; then
            echo "✅ **Values file found:** \`$VALUES\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::Values file not found: $VALUES"
            echo "❌ **Values file NOT found:** \`$VALUES\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**The values.yaml file is required for promotion.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please ensure the file exists in \`kubernetes/\` before running this workflow." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Available files in kubernetes/:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            ls -la kubernetes/ 2>/dev/null || echo "Directory not found" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Verify required manifests downloaded
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Manifest Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          MISSING=0

          if [[ "$SCOPE" == "all" || "$SCOPE" == "prod" ]]; then
            if [ -f "$MANIFEST" ]; then
              echo "✅ PROD manifest downloaded" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ PROD manifest missing from release: \`splunk-astronomy-shop-${VERSION}.yaml\`" >> $GITHUB_STEP_SUMMARY
              MISSING=1
            fi
          fi

          if [[ "$SCOPE" == "all" || "$SCOPE" == "diab" ]]; then
            if [ -f "$MANIFEST_DIAB" ]; then
              echo "✅ DIAB manifest downloaded" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ DIAB manifest missing from release: \`splunk-astronomy-shop-${VERSION}-diab.yaml\`" >> $GITHUB_STEP_SUMMARY
              MISSING=1
            fi
          fi

          # Lambda, dc-shim, and secureapp are optional
          [ -f "$MANIFEST_LAMBDA" ] && echo "✅ Lambda manifest downloaded" >> $GITHUB_STEP_SUMMARY || echo "ℹ️ Lambda manifest not in release (optional)" >> $GITHUB_STEP_SUMMARY
          [ -f "$MANIFEST_DC_SHIM" ] && echo "✅ DC-Shim manifest downloaded" >> $GITHUB_STEP_SUMMARY || echo "ℹ️ DC-Shim manifest not in release (optional)" >> $GITHUB_STEP_SUMMARY
          [ -f "$MANIFEST_SECUREAPP" ] && echo "✅ SecureApp manifest downloaded" >> $GITHUB_STEP_SUMMARY || echo "ℹ️ SecureApp manifest not in release (optional)" >> $GITHUB_STEP_SUMMARY
          [ -f "$MANIFEST_THROTTLE_DEMO" ] && echo "✅ Throttle-demo manifest downloaded" >> $GITHUB_STEP_SUMMARY || echo "ℹ️ Throttle-demo manifest not in release (optional)" >> $GITHUB_STEP_SUMMARY

          if [ $MISSING -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "::error::Required manifest files missing from release v${VERSION}"
            exit 1
          fi

      # -----------------------------
      # PROD FLOW
      # -----------------------------
      - name: Copy PROD files
        if: (env.SCOPE == 'all' || env.SCOPE == 'prod') && github.event.inputs.dry_run != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PROD Deployment" >> $GITHUB_STEP_SUMMARY

          PROD_DIR="target/splunk-astronomy-shop/splunk-astronomy-demo-${VERSION}"
          LATEST_DIR="target/splunk-astronomy-shop/splunk-astronomy-demo-latest"

          mkdir -p "$PROD_DIR"

          # Copy all files into versioned directory
          cp "$MANIFEST" "$PROD_DIR/"
          cp "$VALUES" "$PROD_DIR/"
          [ -f "$MANIFEST_LAMBDA" ] && cp "$MANIFEST_LAMBDA" "$PROD_DIR/"
          [ -f "$MANIFEST_DC_SHIM" ] && cp "$MANIFEST_DC_SHIM" "$PROD_DIR/"
          [ -f "$MANIFEST_SECUREAPP" ] && cp "$MANIFEST_SECUREAPP" "$PROD_DIR/"
          [ -f "$MANIFEST_THROTTLE_DEMO" ] && cp "$MANIFEST_THROTTLE_DEMO" "$PROD_DIR/"

          echo "✅ Copied to \`$PROD_DIR/\`" >> $GITHUB_STEP_SUMMARY

          # Replace latest with a copy of the versioned directory
          rm -rf "$LATEST_DIR"
          cp -r "$PROD_DIR" "$LATEST_DIR"

          echo "✅ Updated \`splunk-astronomy-demo-latest/\`" >> $GITHUB_STEP_SUMMARY

      # -----------------------------
      # DIAB FLOW
      # -----------------------------
      - name: Copy DIAB files
        if: (env.SCOPE == 'all' || env.SCOPE == 'diab') && github.event.inputs.dry_run != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### DIAB Deployment" >> $GITHUB_STEP_SUMMARY

          # --- V3 targets ---
          V3_DEPLOY_DIR="target/demo-in-a-box/v3/deployments/splunk-astronomy-demo-${VERSION}"
          V3_LATEST_DIR="target/demo-in-a-box/v3/deployments/splunk-astronomy-demo-latest"

          mkdir -p "$V3_DEPLOY_DIR"

          # Values stay in same location
          cp "$VALUES" target/demo-in-a-box/v3/opentelemetry-collector/
          cp "$VALUES" target/demo-in-a-box/v3/opentelemetry-collector/splunk-astronomy-shop-values-latest.yaml

          # Manifests into versioned directory
          cp "$MANIFEST_DIAB" "$V3_DEPLOY_DIR/"
          [ -f "$MANIFEST_LAMBDA" ] && cp "$MANIFEST_LAMBDA" "$V3_DEPLOY_DIR/"
          [ -f "$MANIFEST_DC_SHIM" ] && cp "$MANIFEST_DC_SHIM" "$V3_DEPLOY_DIR/"
          [ -f "$MANIFEST_SECUREAPP" ] && cp "$MANIFEST_SECUREAPP" "$V3_DEPLOY_DIR/"
          [ -f "$MANIFEST_THROTTLE_DEMO" ] && cp "$MANIFEST_THROTTLE_DEMO" "$V3_DEPLOY_DIR/"

          # Replace latest
          rm -rf "$V3_LATEST_DIR"
          cp -r "$V3_DEPLOY_DIR" "$V3_LATEST_DIR"

          echo "✅ Copied to \`target/demo-in-a-box/v3/\`" >> $GITHUB_STEP_SUMMARY

          # --- V4 targets ---
          V4_DEPLOY_DIR="target/demo-in-a-box/v4/demo-manifests/splunk-astronomy-demo-${VERSION}"
          V4_LATEST_DIR="target/demo-in-a-box/v4/demo-manifests/splunk-astronomy-demo-latest"

          mkdir -p "$V4_DEPLOY_DIR"
          mkdir -p target/demo-in-a-box/v4/collector

          # Values stay in same location
          cp "$VALUES" target/demo-in-a-box/v4/collector/splunk-astronomy-shop-latest-values.yaml

          # Manifests into versioned directory
          cp "$MANIFEST_DIAB" "$V4_DEPLOY_DIR/"
          [ -f "$MANIFEST_LAMBDA" ] && cp "$MANIFEST_LAMBDA" "$V4_DEPLOY_DIR/"
          [ -f "$MANIFEST_DC_SHIM" ] && cp "$MANIFEST_DC_SHIM" "$V4_DEPLOY_DIR/"
          [ -f "$MANIFEST_SECUREAPP" ] && cp "$MANIFEST_SECUREAPP" "$V4_DEPLOY_DIR/"
          [ -f "$MANIFEST_THROTTLE_DEMO" ] && cp "$MANIFEST_THROTTLE_DEMO" "$V4_DEPLOY_DIR/"

          # Replace latest
          rm -rf "$V4_LATEST_DIR"
          cp -r "$V4_DEPLOY_DIR" "$V4_LATEST_DIR"

          echo "✅ Copied to \`target/demo-in-a-box/v4/\`" >> $GITHUB_STEP_SUMMARY

      # -----------------------------
      # VERSION HISTORY + PROMOTED-VERSION
      # -----------------------------
      - name: Update version history and promoted version
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "| ${NOW} | ${VERSION} | ${SCOPE} |" >> target/splunk-astronomy-shop/VERSION-HISTORY.md

          # Update PROMOTED-VERSION in source repo
          echo "${VERSION}" > kubernetes/PROMOTED-VERSION

      - name: Update PROMOTED-VERSION via PR
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/promoted-version-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/PROMOTED-VERSION
          if ! git diff --staged --quiet; then
            git checkout -b "$BRANCH"
            git commit -m "chore: update PROMOTED-VERSION to ${VERSION}"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "chore: update PROMOTED-VERSION to ${VERSION}" \
              --body "Auto-generated by promote workflow after successful promotion of v${VERSION} (${SCOPE})." \
              --base main \
              --head "$BRANCH"
            # Auto-merge if allowed
            gh pr merge "$BRANCH" --auto --squash 2>/dev/null || true
          fi

      # -----------------------------
      # COMMIT + PUSH
      # -----------------------------
      - name: Commit & push changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### No Changes" >> $GITHUB_STEP_SUMMARY
            echo "No changes to commit - files may already be up to date." >> $GITHUB_STEP_SUMMARY
          else
            git commit -m "Promote Astronomy Shop ${VERSION} (${SCOPE})" \
              -m "" \
              -m "Promoted from: splunk/opentelemetry-demo" \
              -m "Version: ${VERSION}" \
              -m "Scope: ${SCOPE}"
            git push

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ Promotion Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Version **${VERSION}** promoted to splunk/o11y-field-demos" >> $GITHUB_STEP_SUMMARY
          fi

      # -----------------------------
      # WORKSHOP FLOW
      # (splunk/observability-workshop under workshop/k3s/)
      # Copies manifests renamed with -latest, excludes DIAB variant.
      # Values file lands at workshop/k3s/splunk-astronomy-shop-latest-values.yaml.
      # -----------------------------
      - name: Copy files to workshop repo
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.update_workshop == 'true' }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workshop Deployment" >> $GITHUB_STEP_SUMMARY

          WORKSHOP_DIR="target-workshop/workshop/k3s/splunk-astronomy-shop"
          WORKSHOP_ROOT="target-workshop/workshop/k3s"

          mkdir -p "$WORKSHOP_DIR"

          # Manifests renamed VER -> latest. DIAB excluded (workshop uses
          # PROD manifest with in-cluster collector setup, not the DIAB
          # variant which bundles Traefik ingress).
          cp "$MANIFEST" "$WORKSHOP_DIR/splunk-astronomy-shop-latest.yaml"
          [ -f "$MANIFEST_LAMBDA" ] && cp "$MANIFEST_LAMBDA" "$WORKSHOP_DIR/splunk-astronomy-shop-latest-lambda.yaml"
          [ -f "$MANIFEST_DC_SHIM" ] && cp "$MANIFEST_DC_SHIM" "$WORKSHOP_DIR/splunk-astronomy-shop-latest-dc-shim.yaml"
          [ -f "$MANIFEST_SECUREAPP" ] && cp "$MANIFEST_SECUREAPP" "$WORKSHOP_DIR/splunk-astronomy-shop-latest-secureapp.yaml"
          [ -f "$MANIFEST_THROTTLE_DEMO" ] && cp "$MANIFEST_THROTTLE_DEMO" "$WORKSHOP_DIR/splunk-astronomy-shop-latest-throttle-demo.yaml"

          # Values file lands at k3s root (mirrors demo-in-a-box v4 collector layout).
          cp "$VALUES" "$WORKSHOP_ROOT/splunk-astronomy-shop-latest-values.yaml"

          echo "✅ Copied to \`$WORKSHOP_DIR/\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ Values at \`$WORKSHOP_ROOT/splunk-astronomy-shop-latest-values.yaml\`" >> $GITHUB_STEP_SUMMARY

      - name: Commit & open PR against workshop repo
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.update_workshop == 'true' }}
        env:
          # gh CLI targets the workshop repo; token needs repo scope there.
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          cd target-workshop
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Workshop: No Changes" >> $GITHUB_STEP_SUMMARY
            echo "No changes to commit - files may already be up to date." >> $GITHUB_STEP_SUMMARY
          else
            # observability-workshop main is branch-protected — direct push
            # is rejected. Push a feature branch and open a PR instead.
            BRANCH="chore/promote-astronomy-shop-${VERSION}"
            git checkout -b "$BRANCH"
            git commit -m "Update Astronomy Shop workshop manifests to ${VERSION}" \
              -m "" \
              -m "Promoted from: splunk/opentelemetry-demo" \
              -m "Version: ${VERSION}"
            # Force so re-runs of the same version overwrite the branch cleanly.
            git push -f -u origin "$BRANCH"

            PR_URL=$(gh pr create \
              --repo splunk/observability-workshop \
              --base main \
              --head "$BRANCH" \
              --title "chore(astronomy-shop): promote ${VERSION} manifests" \
              --body "Auto-generated by promote workflow from splunk/opentelemetry-demo v${VERSION}. Updates workshop/k3s/splunk-astronomy-shop/*-latest*.yaml + workshop/k3s/splunk-astronomy-shop-latest-values.yaml." \
              2>/dev/null || \
              gh pr view --repo splunk/observability-workshop --head "$BRANCH" --json url --jq .url)

            # Try auto-merge (squash) so it lands without human intervention
            # when checks are green. No-op if branch protection blocks it.
            gh pr merge --repo splunk/observability-workshop --auto --squash "$BRANCH" 2>/dev/null || true

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ Workshop PR opened" >> $GITHUB_STEP_SUMMARY
            echo "Version **${VERSION}** manifests staged in splunk/observability-workshop" >> $GITHUB_STEP_SUMMARY
            echo "PR: ${PR_URL}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧪 Dry Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validation passed. No files were copied (dry run mode)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To actually promote, run again with **Dry run** unchecked." >> $GITHUB_STEP_SUMMARY

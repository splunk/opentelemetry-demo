name: Build Demo Manifest - PRODUCTION
# NOTE: Repository check happens at job level (line 29), not at workflow level
# GitHub Actions shows workflow inputs before job conditions are evaluated
# This workflow is designed for splunk/opentelemetry-demo repository only

"on":
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - none (keep current)
          - patch
          - minor
          - major
        default: 'none (keep current)'
      beta_build:
        description: 'Beta build (adds -beta suffix, outputs to kubernetes/beta/)'
        required: true
        type: boolean
        default: false
      validate_manifest:
        description: 'Validate resulting YAML'
        required: true
        type: boolean
        default: true
      commit_manifest:
        description: 'Commit the generated manifest and version to repository'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        type: string
        default: 'none (keep current)'
      beta_build:
        description: 'Beta build (adds -beta suffix, outputs to kubernetes/beta/)'
        required: false
        type: boolean
        default: false
      validate_manifest:
        description: 'Validate resulting YAML'
        required: false
        type: boolean
        default: true
      commit_manifest:
        description: 'Commit the generated manifest and version to repository'
        required: false
        type: boolean
        default: true

jobs:
  build-production-manifest:
    # Only run in the main splunk/opentelemetry-demo repo, not in forks
    # TEMPORARY: Commented out for testing in fork - UNCOMMENT BEFORE PR TO PROD
    if: github.repository == 'splunk/opentelemetry-demo'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Make scripts executable
        run: |
          chmod +x .github/scripts/stitch-manifests.sh
          chmod +x .github/scripts/manage-hotfix.py
          chmod +x .github/scripts/bump-version.py
          chmod +x .github/scripts/show-image-versions.py

      - name: Ensure single-version mode (remove per-service test versions)
        run: |
          # Production builds use SPLUNK-VERSION for all services
          # Remove .service-versions.yaml (test-only) if it exists
          if [ -f ".service-versions.yaml" ]; then
            echo "Removing .service-versions.yaml (test/dev only)"
            rm .service-versions.yaml
          fi
          # Keep .hotfix.yaml if it exists (production hotfixes)

      - name: Determine and bump version
        id: version
        run: |
          # Production uses SPLUNK-VERSION as base
          # Hotfixes are tracked separately in .hotfix.yaml

          CURRENT_VERSION=$(cat SPLUNK-VERSION)
          BUMP_TYPE="${{ inputs.version_bump }}"

          # Bump version if requested
          if [[ "$BUMP_TYPE" != "none (keep current)" ]]; then
            NEW_VERSION=$(python3 .github/scripts/bump-version.py "$CURRENT_VERSION" "$BUMP_TYPE")
            echo "$NEW_VERSION" > SPLUNK-VERSION
            echo "✅ SPLUNK-VERSION bumped: $CURRENT_VERSION → $NEW_VERSION"
            VERSION_BUMPED="true"
          else
            NEW_VERSION="$CURRENT_VERSION"
            echo "Using current version: $CURRENT_VERSION"
            VERSION_BUMPED="false"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "version_bumped=$VERSION_BUMPED" >> $GITHUB_OUTPUT

          echo "### 📋 Manifest Version" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$VERSION_BUMPED" == "true" ]]; then
            echo "| Type | Version |" >> $GITHUB_STEP_SUMMARY
            echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
            echo "| Previous | \`$CURRENT_VERSION\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **New** | **\`$NEW_VERSION\`** |" >> $GITHUB_STEP_SUMMARY
            echo "| Bump Type | $BUMP_TYPE |" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Version:** \`$NEW_VERSION\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for active hotfixes
          if [ -f ".hotfix.yaml" ]; then
            echo "#### 🔧 Active Hotfixes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            python3 .github/scripts/manage-hotfix.py status >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Manifest will include hotfixed service versions" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build/Stitch Kubernetes manifests
        id: stitch
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stitching Manifests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VERSION="${{ steps.version.outputs.new_version }}"

          # Determine output directory and suffix based on beta flag
          if [[ "${{ inputs.beta_build }}" == "true" ]]; then
            OUTPUT_DIR="kubernetes/beta"
            EXTRA_SUFFIX="-beta"
            mkdir -p "$OUTPUT_DIR"
            echo "🧪 **Beta Build** - Output to kubernetes/beta/ with -beta suffix" >> $GITHUB_STEP_SUMMARY
          else
            OUTPUT_DIR="kubernetes"
            EXTRA_SUFFIX=""
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build BOTH regular and DIAB manifests
          echo "Building **regular** manifest..." >> $GITHUB_STEP_SUMMARY
          .github/scripts/stitch-manifests.sh prod "" "$OUTPUT_DIR" "$EXTRA_SUFFIX"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Building **DIAB** manifest (includes ingress)..." >> $GITHUB_STEP_SUMMARY
          .github/scripts/stitch-manifests.sh prod diab "$OUTPUT_DIR" "$EXTRA_SUFFIX"

          # Determine manifest filenames
          MANIFEST_FILE="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}${EXTRA_SUFFIX}.yaml"
          MANIFEST_FILE_DIAB="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}-diab${EXTRA_SUFFIX}.yaml"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Generated Manifests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify and report on regular manifest
          if [ -f "$MANIFEST_FILE" ]; then
            FILE_SIZE=$(du -h "$MANIFEST_FILE" | cut -f1)
            LINE_COUNT=$(wc -l < "$MANIFEST_FILE")
            RESOURCE_COUNT=$(grep -c "^kind: " "$MANIFEST_FILE" || true)

            echo "✅ **Regular manifest created**" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| File | \`$MANIFEST_FILE\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Size | $FILE_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | $LINE_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| Resources | $RESOURCE_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Regular manifest not created**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Verify and report on DIAB manifest
          if [ -f "$MANIFEST_FILE_DIAB" ]; then
            FILE_SIZE_DIAB=$(du -h "$MANIFEST_FILE_DIAB" | cut -f1)
            LINE_COUNT_DIAB=$(wc -l < "$MANIFEST_FILE_DIAB")
            RESOURCE_COUNT_DIAB=$(grep -c "^kind: " "$MANIFEST_FILE_DIAB" || true)

            echo "✅ **DIAB manifest created** (includes ingress)" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| File | \`$MANIFEST_FILE_DIAB\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Size | $FILE_SIZE_DIAB |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | $LINE_COUNT_DIAB |" >> $GITHUB_STEP_SUMMARY
            echo "| Resources | $RESOURCE_COUNT_DIAB |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **DIAB manifest not created**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "| Registry | Production (ghcr.io/splunk/opentelemetry-demo) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output both filenames for subsequent steps
          echo "manifest_file=$MANIFEST_FILE" >> $GITHUB_OUTPUT
          echo "manifest_file_diab=$MANIFEST_FILE_DIAB" >> $GITHUB_OUTPUT
          echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT
          echo "extra_suffix=$EXTRA_SUFFIX" >> $GITHUB_OUTPUT

      - name: Validate manifest YAML syntax
        if: ${{ inputs.validate_manifest }}
        run: |
          echo "### Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          MANIFEST_FILE="${{ steps.stitch.outputs.manifest_file }}"
          MANIFEST_FILE_DIAB="${{ steps.stitch.outputs.manifest_file_diab }}"

          # Validate regular manifest
          echo "#### Regular Manifest" >> $GITHUB_STEP_SUMMARY
          if python3 -c "import yaml; list(yaml.safe_load_all(open('$MANIFEST_FILE')))" 2> /tmp/validation.log; then
            DOC_COUNT=$(python3 -c "import yaml; print(len(list(yaml.safe_load_all(open('$MANIFEST_FILE')))))")
            echo "✅ **YAML syntax validation passed** ($DOC_COUNT documents)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **YAML syntax validation failed**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat /tmp/validation.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Validate DIAB manifest
          echo "#### DIAB Manifest" >> $GITHUB_STEP_SUMMARY
          if python3 -c "import yaml; list(yaml.safe_load_all(open('$MANIFEST_FILE_DIAB')))" 2> /tmp/validation_diab.log; then
            DOC_COUNT_DIAB=$(python3 -c "import yaml; print(len(list(yaml.safe_load_all(open('$MANIFEST_FILE_DIAB')))))")
            echo "✅ **YAML syntax validation passed** ($DOC_COUNT_DIAB documents)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **YAML syntax validation failed**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat /tmp/validation_diab.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Show resource breakdown for regular manifest
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Types (Regular):**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep "^kind: " "$MANIFEST_FILE" | sort | uniq -c | sort -rn >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Show image version breakdown in manifest
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Image Versions in Manifest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This manifest includes the following service image versions:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Show version breakdown
          python3 .github/scripts/show-image-versions.py \
            --base-version "${{ steps.version.outputs.new_version }}" \
            --format github >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          # Show summary
          echo "**Summary:**" >> $GITHUB_STEP_SUMMARY
          python3 .github/scripts/show-image-versions.py \
            --base-version "${{ steps.version.outputs.new_version }}" \
            --summary-only >> $GITHUB_STEP_SUMMARY

      - name: Create Pull Request with manifest changes
        if: ${{ inputs.commit_manifest }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.new_version }}"
          OLD_VERSION="${{ steps.version.outputs.old_version }}"
          VERSION_BUMPED="${{ steps.version.outputs.version_bumped }}"
          MANIFEST_FILE="${{ steps.stitch.outputs.manifest_file }}"
          MANIFEST_FILE_DIAB="${{ steps.stitch.outputs.manifest_file_diab }}"
          BUMP_TYPE="${{ inputs.version_bump }}"
          BETA_BUILD="${{ inputs.beta_build }}"

          # Set branch name based on beta flag
          if [[ "$BETA_BUILD" == "true" ]]; then
            BRANCH_NAME="release/manifest-${VERSION}-beta"
          else
            BRANCH_NAME="release/manifest-${VERSION}"
          fi

          # Add version file if it was bumped (only for non-beta builds)
          if [[ "$VERSION_BUMPED" == "true" ]] && [[ "$BETA_BUILD" != "true" ]]; then
            git add SPLUNK-VERSION
          fi

          # Add both manifest files
          git add "$MANIFEST_FILE"
          git add "$MANIFEST_FILE_DIAB"

          if git diff --staged --quiet; then
            echo "### No Changes" >> $GITHUB_STEP_SUMMARY
            echo "No changes to commit." >> $GITHUB_STEP_SUMMARY
          else
            # Create and checkout new branch
            git checkout -b "$BRANCH_NAME"

            # Set commit message based on whether version changed and beta flag
            if [[ "$BETA_BUILD" == "true" ]]; then
              COMMIT_TITLE="Beta: ${VERSION}"
              PR_TITLE="Beta ${VERSION}: Production Manifests"

              git commit -m "$COMMIT_TITLE" \
                -m "Beta production manifests (regular + DIAB)" \
                -m "" \
                -m "- Version: ${VERSION}" \
                -m "- Regular: $MANIFEST_FILE" \
                -m "- DIAB: $MANIFEST_FILE_DIAB" \
                -m "- Registry: ghcr.io/splunk/opentelemetry-demo (production)" \
                -m "" \
                -m "Updated:" \
                -m "- Regular manifest (beta)" \
                -m "- DIAB manifest (beta)"
            elif [[ "$VERSION_BUMPED" == "true" ]]; then
              COMMIT_TITLE="Release: ${VERSION}"
              PR_TITLE="Release ${VERSION}: Production Manifests"

              git commit -m "$COMMIT_TITLE" \
                -m "Production manifests with version bump (regular + DIAB)" \
                -m "" \
                -m "- Version: ${OLD_VERSION} → ${VERSION}" \
                -m "- Bump Type: ${{ inputs.version_bump }}" \
                -m "- Regular: $MANIFEST_FILE" \
                -m "- DIAB: $MANIFEST_FILE_DIAB" \
                -m "- Registry: ghcr.io/splunk/opentelemetry-demo (production)" \
                -m "" \
                -m "Updated:" \
                -m "- SPLUNK-VERSION" \
                -m "- Regular manifest" \
                -m "- DIAB manifest"
            else
              COMMIT_TITLE="Update manifests: ${VERSION}"
              PR_TITLE="Update Production Manifests: ${VERSION}"

              git commit -m "$COMMIT_TITLE" \
                -m "Production manifests (no version change)" \
                -m "" \
                -m "- Version: ${VERSION}" \
                -m "- Regular: $MANIFEST_FILE" \
                -m "- DIAB: $MANIFEST_FILE_DIAB" \
                -m "- Registry: ghcr.io/splunk/opentelemetry-demo (production)" \
                -m "" \
                -m "Updated:" \
                -m "- Regular manifest" \
                -m "- DIAB manifest"
            fi

            # Delete remote branch if it exists (from previous failed runs)
            git push origin --delete "$BRANCH_NAME" 2>/dev/null || true

            # Push branch
            git push -u origin "$BRANCH_NAME"

            # Create pull request body
            if [[ "$BETA_BUILD" == "true" ]]; then
              PR_BODY=$(printf '%s\n' \
                "## Beta Production Manifests ${VERSION}" \
                "" \
                "**Version:** \`${VERSION}\`" \
                "**Registry:** Production (\`ghcr.io/splunk/opentelemetry-demo\`)" \
                "**Type:** 🧪 Beta" \
                "" \
                "### Manifests" \
                "- ✅ Regular: \`${MANIFEST_FILE}\`" \
                "- ✅ DIAB: \`${MANIFEST_FILE_DIAB}\`" \
                "" \
                "### Manifest Contents" \
                "These beta manifests combine all service deployments for testing." \
                "" \
                "See the **Image Versions in Manifest** section in the workflow summary for details." \
                "" \
                "---" \
                "🤖 Generated automatically by GitHub Actions"
              )
            elif [[ "$VERSION_BUMPED" == "true" ]]; then
              PR_BODY=$(printf '%s\n' \
                "## Production Manifest Release ${VERSION}" \
                "" \
                "**Version Bump:** ${OLD_VERSION} → ${VERSION} (${{ inputs.version_bump }})" \
                "**Registry:** Production (\`ghcr.io/splunk/opentelemetry-demo\`)" \
                "" \
                "### Manifests" \
                "- ✅ SPLUNK-VERSION updated to \`${VERSION}\`" \
                "- ✅ Regular: \`${MANIFEST_FILE}\`" \
                "- ✅ DIAB: \`${MANIFEST_FILE_DIAB}\`" \
                "" \
                "### Manifest Contents" \
                "These manifests combine all service deployments. They may contain mixed image versions:" \
                "- Services built at \`${VERSION}\`" \
                "- Services at older versions" \
                "- Hotfixed services with custom versions" \
                "" \
                "See the **Image Versions in Manifest** section in the workflow summary for details." \
                "" \
                "---" \
                "🤖 Generated automatically by GitHub Actions"
              )
            else
              PR_BODY=$(printf '%s\n' \
                "## Production Manifest Update" \
                "" \
                "**Version:** \`${VERSION}\` (unchanged)" \
                "**Registry:** Production (\`ghcr.io/splunk/opentelemetry-demo\`)" \
                "" \
                "### Manifests" \
                "- ✅ Regular: \`${MANIFEST_FILE}\`" \
                "- ✅ DIAB: \`${MANIFEST_FILE_DIAB}\`" \
                "" \
                "### Manifest Contents" \
                "These manifests combine all service deployments with their current image versions." \
                "" \
                "See the **Image Versions in Manifest** section in the workflow summary for details." \
                "" \
                "---" \
                "🤖 Generated automatically by GitHub Actions"
              )
            fi

            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH_NAME"

            PR_URL=$(gh pr view "$BRANCH_NAME" --json url -q .url)

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Pull Request Created ✅" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**PR:** [$PR_TITLE]($PR_URL)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Branch:** \`$BRANCH_NAME\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Changes:**" >> $GITHUB_STEP_SUMMARY
            if [[ "$VERSION_BUMPED" == "true" ]] && [[ "$BETA_BUILD" != "true" ]]; then
              echo "- ✅ SPLUNK-VERSION: ${OLD_VERSION} → \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- ✅ Regular manifest: \`$MANIFEST_FILE\`" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ DIAB manifest: \`$MANIFEST_FILE_DIAB\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "👉 **Review and merge the PR to deploy**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload manifests as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astronomy-shop-manifests-${{ steps.version.outputs.new_version }}${{ inputs.beta_build == true && '-beta' || '' }}
          path: |
            ${{ steps.stitch.outputs.manifest_file }}
            ${{ steps.stitch.outputs.manifest_file_diab }}
          retention-days: 90

      - name: Generate deployment command
        run: |
          MANIFEST_FILE="${{ steps.stitch.outputs.manifest_file }}"
          MANIFEST_FILE_DIAB="${{ steps.stitch.outputs.manifest_file_diab }}"
          ARTIFACT_NAME="astronomy-shop-manifests-${{ steps.version.outputs.new_version }}"
          if [[ "${{ inputs.beta_build }}" == "true" ]]; then
            ARTIFACT_NAME="${ARTIFACT_NAME}-beta"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Deploy to Production Cluster" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option 1: Deploy from Repository (Regular)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Pull latest changes" >> $GITHUB_STEP_SUMMARY
          echo "git pull" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Deploy regular manifest" >> $GITHUB_STEP_SUMMARY
          echo "kubectl apply -f $MANIFEST_FILE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify deployment" >> $GITHUB_STEP_SUMMARY
          echo "kubectl get all -n astronomy-shop" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option 2: Deploy from Repository (DIAB - includes ingress)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Deploy DIAB manifest (includes ingress)" >> $GITHUB_STEP_SUMMARY
          echo "kubectl apply -f $MANIFEST_FILE_DIAB" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option 3: Download Artifact" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Download artifact: \`${ARTIFACT_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract the YAML files" >> $GITHUB_STEP_SUMMARY
          echo "3. Deploy: \`kubectl apply -f <manifest-file>.yaml\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Monitor Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Watch pods come up" >> $GITHUB_STEP_SUMMARY
          echo "kubectl get pods -n astronomy-shop -w" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Check pod status" >> $GITHUB_STEP_SUMMARY
          echo "kubectl get pods -n astronomy-shop" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# View logs for a service" >> $GITHUB_STEP_SUMMARY
          echo "kubectl logs -n astronomy-shop deployment/<service-name>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Check services" >> $GITHUB_STEP_SUMMARY
          echo "kubectl get svc -n astronomy-shop" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✨ Production Manifests Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY

          VERSION_BUMPED="${{ steps.version.outputs.version_bumped }}"
          if [[ "$VERSION_BUMPED" == "true" ]]; then
            echo "| **Previous Version** | \`${{ steps.version.outputs.old_version }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **New Version** | **\`${{ steps.version.outputs.new_version }}\`** |" >> $GITHUB_STEP_SUMMARY
            echo "| **Bump Type** | ${{ inputs.version_bump }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Version** | \`${{ steps.version.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| **Regular Manifest** | \`${{ steps.stitch.outputs.manifest_file }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **DIAB Manifest** | \`${{ steps.stitch.outputs.manifest_file_diab }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | Production (ghcr.io/splunk/opentelemetry-demo) |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.beta_build }}" == "true" ]]; then
            echo "| **Build Type** | 🧪 Beta |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Validated** | ${{ inputs.validate_manifest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Committed** | ${{ inputs.commit_manifest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact Retention** | 90 days |" >> $GITHUB_STEP_SUMMARY

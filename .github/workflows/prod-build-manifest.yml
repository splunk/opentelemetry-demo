name: Build Demo Manifest - PRODUCTION
# NOTE: Repository check happens at job level (line 29), not at workflow level
# GitHub Actions shows workflow inputs before job conditions are evaluated
# This workflow is designed for splunk/opentelemetry-demo repository only

"on":
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - none (keep current)
          - patch
          - minor
          - major
        default: 'none (keep current)'
      beta_build:
        description: 'Beta build (adds -beta suffix, outputs to kubernetes/beta/)'
        required: true
        type: boolean
        default: false
      validate_manifest:
        description: 'Validate resulting YAML'
        required: true
        type: boolean
        default: true
      publish_release:
        description: 'Publish manifests to GitHub Release (creates or updates release assets)'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        type: string
        default: 'none (keep current)'
      beta_build:
        description: 'Beta build (adds -beta suffix)'
        required: false
        type: boolean
        default: false
      validate_manifest:
        description: 'Validate resulting YAML'
        required: false
        type: boolean
        default: true
      publish_release:
        description: 'Publish manifests to GitHub Release'
        required: false
        type: boolean
        default: true

jobs:
  build-production-manifest:
    # Only run in the main splunk/opentelemetry-demo repo, not in forks
    # TEMPORARY: Commented out for testing in fork - UNCOMMENT BEFORE PR TO PROD
    if: github.repository == 'splunk/opentelemetry-demo'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Make scripts executable
        run: |
          chmod +x .github/scripts/stitch-manifests.sh
          chmod +x .github/scripts/manage-hotfix.py
          chmod +x .github/scripts/bump-version.py
          chmod +x .github/scripts/show-image-versions.py

      - name: Ensure single-version mode (remove per-service test versions)
        run: |
          # Production builds use SPLUNK-VERSION for all services
          # Remove .service-versions.yaml (test-only) if it exists
          if [ -f ".service-versions.yaml" ]; then
            echo "Removing .service-versions.yaml (test/dev only)"
            rm .service-versions.yaml
          fi
          # Keep .hotfix.yaml if it exists (production hotfixes)

      - name: Determine and bump version
        id: version
        run: |
          # Production uses SPLUNK-VERSION as base
          # Hotfixes are tracked separately in .hotfix.yaml

          CURRENT_VERSION=$(cat SPLUNK-VERSION)
          BUMP_TYPE="${{ inputs.version_bump }}"

          # Bump version if requested
          if [[ "$BUMP_TYPE" != "none (keep current)" ]]; then
            NEW_VERSION=$(python3 .github/scripts/bump-version.py "$CURRENT_VERSION" "$BUMP_TYPE")
            echo "$NEW_VERSION" > SPLUNK-VERSION
            echo "✅ SPLUNK-VERSION bumped: $CURRENT_VERSION → $NEW_VERSION"
            VERSION_BUMPED="true"
          else
            NEW_VERSION="$CURRENT_VERSION"
            echo "Using current version: $CURRENT_VERSION"
            VERSION_BUMPED="false"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "version_bumped=$VERSION_BUMPED" >> $GITHUB_OUTPUT

          echo "### 📋 Manifest Version" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$VERSION_BUMPED" == "true" ]]; then
            echo "| Type | Version |" >> $GITHUB_STEP_SUMMARY
            echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
            echo "| Previous | \`$CURRENT_VERSION\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **New** | **\`$NEW_VERSION\`** |" >> $GITHUB_STEP_SUMMARY
            echo "| Bump Type | $BUMP_TYPE |" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Version:** \`$NEW_VERSION\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for active hotfixes
          if [ -f ".hotfix.yaml" ]; then
            echo "#### 🔧 Active Hotfixes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            python3 .github/scripts/manage-hotfix.py status >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Manifest will include hotfixed service versions" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build/Stitch Kubernetes manifests
        id: stitch
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stitching Manifests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VERSION="${{ steps.version.outputs.new_version }}"

          # Determine output directory and suffix based on beta flag
          if [[ "${{ inputs.beta_build }}" == "true" ]]; then
            OUTPUT_DIR="kubernetes/beta"
            EXTRA_SUFFIX="-beta"
            mkdir -p "$OUTPUT_DIR"
            echo "🧪 **Beta Build** - Output to kubernetes/beta/ with -beta suffix" >> $GITHUB_STEP_SUMMARY
          else
            OUTPUT_DIR="kubernetes"
            EXTRA_SUFFIX=""
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build BOTH regular and DIAB manifests
          echo "Building **regular** manifest..." >> $GITHUB_STEP_SUMMARY
          .github/scripts/stitch-manifests.sh prod "" "$OUTPUT_DIR" "$EXTRA_SUFFIX"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Building **DIAB** manifest (includes ingress)..." >> $GITHUB_STEP_SUMMARY
          .github/scripts/stitch-manifests.sh prod diab "$OUTPUT_DIR" "$EXTRA_SUFFIX"

          # Determine manifest filenames
          MANIFEST_FILE="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}${EXTRA_SUFFIX}.yaml"
          MANIFEST_FILE_DIAB="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}-diab${EXTRA_SUFFIX}.yaml"
          MANIFEST_LAMBDA="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}-lambda${EXTRA_SUFFIX}.yaml"
          MANIFEST_DC_SHIM="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}-dc-shim${EXTRA_SUFFIX}.yaml"
          MANIFEST_SECUREAPP="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}-secureapp${EXTRA_SUFFIX}.yaml"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Generated Manifests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Manifest | File | Size | Resources |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|------|-----------|" >> $GITHUB_STEP_SUMMARY

          for MFILE in "$MANIFEST_FILE" "$MANIFEST_FILE_DIAB" "$MANIFEST_LAMBDA" "$MANIFEST_DC_SHIM" "$MANIFEST_SECUREAPP"; do
            MNAME=$(basename "$MFILE")
            if [ -f "$MFILE" ]; then
              MSIZE=$(du -h "$MFILE" | cut -f1)
              MRESOURCES=$(grep -c "^kind: " "$MFILE" || true)
              echo "| $MNAME | \`$MFILE\` | $MSIZE | $MRESOURCES |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $MNAME | not generated | - | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail if main manifest wasn't created
          if [ ! -f "$MANIFEST_FILE" ]; then
            echo "❌ **Main manifest not created**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "| Registry | Production (ghcr.io/splunk/opentelemetry-demo) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output filenames for subsequent steps
          echo "manifest_file=$MANIFEST_FILE" >> $GITHUB_OUTPUT
          echo "manifest_file_diab=$MANIFEST_FILE_DIAB" >> $GITHUB_OUTPUT
          echo "manifest_lambda=$MANIFEST_LAMBDA" >> $GITHUB_OUTPUT
          echo "manifest_dc_shim=$MANIFEST_DC_SHIM" >> $GITHUB_OUTPUT
          echo "manifest_secureapp=$MANIFEST_SECUREAPP" >> $GITHUB_OUTPUT
          echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT
          echo "extra_suffix=$EXTRA_SUFFIX" >> $GITHUB_OUTPUT

      - name: Validate manifest YAML syntax
        if: ${{ inputs.validate_manifest }}
        run: |
          echo "### Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          for MFILE in "${{ steps.stitch.outputs.manifest_file }}" \
                       "${{ steps.stitch.outputs.manifest_file_diab }}" \
                       "${{ steps.stitch.outputs.manifest_lambda }}" \
                       "${{ steps.stitch.outputs.manifest_dc_shim }}" \
                       "${{ steps.stitch.outputs.manifest_secureapp }}"; do
            if [ -f "$MFILE" ]; then
              MNAME=$(basename "$MFILE")
              if python3 -c "import yaml; docs=list(yaml.safe_load_all(open('$MFILE'))); print(f'$MNAME: {len(docs)} documents')"; then
                echo "- ✅ $MNAME: **valid**" >> $GITHUB_STEP_SUMMARY
              else
                echo "- ❌ $MNAME: **INVALID**" >> $GITHUB_STEP_SUMMARY
                FAILED=1
              fi
            fi
          done

          # Show resource breakdown for main manifest
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Types (Main):**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep "^kind: " "${{ steps.stitch.outputs.manifest_file }}" | sort | uniq -c | sort -rn >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Show image version breakdown in manifest
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Image Versions in Manifest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This manifest includes the following service image versions:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Show version breakdown
          python3 .github/scripts/show-image-versions.py \
            --base-version "${{ steps.version.outputs.new_version }}" \
            --format github >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          # Show summary
          echo "**Summary:**" >> $GITHUB_STEP_SUMMARY
          python3 .github/scripts/show-image-versions.py \
            --base-version "${{ steps.version.outputs.new_version }}" \
            --summary-only >> $GITHUB_STEP_SUMMARY

      - name: Publish manifests to GitHub Release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          BETA_BUILD="${{ inputs.beta_build }}"

          if [[ "$BETA_BUILD" == "true" ]]; then
            TAG="v${VERSION}-beta"
            PRERELEASE="--prerelease"
            TITLE="v${VERSION} (beta manifests)"
          else
            TAG="v${VERSION}"
            PRERELEASE=""
            TITLE="v${VERSION}"
          fi

          # Collect manifest files
          ASSETS=""
          for MFILE in "${{ steps.stitch.outputs.manifest_file }}" \
                       "${{ steps.stitch.outputs.manifest_file_diab }}" \
                       "${{ steps.stitch.outputs.manifest_lambda }}" \
                       "${{ steps.stitch.outputs.manifest_dc_shim }}" \
                       "${{ steps.stitch.outputs.manifest_secureapp }}"; do
            [ -f "$MFILE" ] && ASSETS="$ASSETS $MFILE"
          done

          # Delete existing release if regenerating
          if gh release view "$TAG" &>/dev/null; then
            echo "Replacing existing release $TAG..."
            gh release delete "$TAG" --yes 2>/dev/null || true
            git push origin --delete "$TAG" 2>/dev/null || true
          fi

          # Create release with manifests
          gh release create "$TAG" $ASSETS \
            --title "$TITLE" \
            $PRERELEASE \
            --notes "$(printf '%s\n' \
              "## Manifests for ${VERSION}" \
              "" \
              "**Registry:** \`ghcr.io/splunk/opentelemetry-demo\`" \
              "" \
              "### Deploy" \
              "\`\`\`bash" \
              "gh release download ${TAG} -p '*.yaml'" \
              "kubectl apply -f splunk-astronomy-shop-${VERSION}.yaml" \
              "\`\`\`" \
              "" \
              "---" \
              "Generated by Build Demo Manifest workflow"
            )"

          RELEASE_URL=$(gh release view "$TAG" --json url -q .url)

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**[$TITLE]($RELEASE_URL)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Manifests attached as release assets." >> $GITHUB_STEP_SUMMARY

      - name: Upload manifests as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astronomy-shop-manifests-${{ steps.version.outputs.new_version }}${{ inputs.beta_build == true && '-beta' || '' }}
          path: |
            ${{ steps.stitch.outputs.manifest_file }}
            ${{ steps.stitch.outputs.manifest_file_diab }}
            ${{ steps.stitch.outputs.manifest_lambda }}
            ${{ steps.stitch.outputs.manifest_dc_shim }}
            ${{ steps.stitch.outputs.manifest_secureapp }}
          retention-days: 90

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Production Manifests Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | Production (ghcr.io/splunk/opentelemetry-demo) |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.beta_build }}" == "true" ]]; then
            echo "| **Build Type** | Beta |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Validated** | ${{ inputs.validate_manifest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Published** | ${{ inputs.publish_release }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact Retention** | 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "gh release download v${VERSION} -p '*.yaml'" >> $GITHUB_STEP_SUMMARY
          echo "kubectl apply -f splunk-astronomy-shop-${VERSION}.yaml" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

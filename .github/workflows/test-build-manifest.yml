name: Build BETA Manifest

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to use (e.g., "[github-username]", "1.2.3-dev"). If not provided, uses current version + suffix'
        required: false
        type: string
        default: ''
      test_version_suffix:
        description: 'Test suffix added to version (only used if version is not provided)'
        required: false
        type: string
        default: '-test'
      commit_manifest:
        description: 'Commit the generated manifest to repository'
        required: true
        type: boolean
        default: false
      validate_manifest:
        description: 'Validate resulting YAML'
        required: true
        type: boolean
        default: true

jobs:
  build-beta-manifest:
    # Only run in forks, not in the main splunk/opentelemetry-demo repo
    if: github.repository != 'splunk/opentelemetry-demo'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Make scripts executable
        run: |
          chmod +x .github/scripts/stitch-manifests.sh
          chmod +x .github/scripts/get-service-version.py

      - name: Get version for testing
        id: version
        run: |
          CURRENT_VERSION=$(cat SPLUNK-VERSION)
          echo "Current version in SPLUNK-VERSION: $CURRENT_VERSION"

          if [ -n "${{ inputs.version }}" ]; then
            TEST_VERSION="${{ inputs.version }}"
            echo "Using explicit version: $TEST_VERSION"
            VERSION_SOURCE="explicit input"
          else
            TEST_VERSION="${CURRENT_VERSION}${{ inputs.test_version_suffix }}"
            echo "Using current version + suffix: $TEST_VERSION"
            VERSION_SOURCE="current + suffix"
          fi

          echo "test_version=$TEST_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          echo "### Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Current Version** (unchanged): \`$CURRENT_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Version**: \`$TEST_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Source**: $VERSION_SOURCE" >> $GITHUB_STEP_SUMMARY
          echo "- **Output**: \`kubernetes/BETA/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f ".service-versions.yaml" ]; then
            echo "#### Per-Service Versions" >> $GITHUB_STEP_SUMMARY
            echo "Using specific versions from \`.service-versions.yaml\`:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat .service-versions.yaml | grep -A 20 "services:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "> SPLUNK-VERSION file is NOT modified by this workflow" >> $GITHUB_STEP_SUMMARY

      - name: Create temporary version file
        run: |
          cp SPLUNK-VERSION SPLUNK-VERSION.backup
          echo "${{ steps.version.outputs.test_version }}" > SPLUNK-VERSION

      - name: Stitch BETA manifests
        id: stitch
        run: |
          VERSION="${{ steps.version.outputs.test_version }}"
          OUTPUT_DIR="kubernetes/BETA"
          mkdir -p "$OUTPUT_DIR"

          echo "### Stitching Manifests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Building **regular** manifests (main + groups)..." >> $GITHUB_STEP_SUMMARY
          .github/scripts/stitch-manifests.sh "" "" "$OUTPUT_DIR" ""

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Building **DIAB** manifest (includes ingress)..." >> $GITHUB_STEP_SUMMARY
          .github/scripts/stitch-manifests.sh "" diab "$OUTPUT_DIR" ""

          # Main manifests
          MANIFEST_FILE="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}.yaml"
          MANIFEST_FILE_DIAB="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}-diab.yaml"

          # Group manifests (generated by the regular stitch run)
          MANIFEST_LAMBDA="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}-lambda.yaml"
          MANIFEST_DC_SHIM="${OUTPUT_DIR}/splunk-astronomy-shop-${VERSION}-dc-shim.yaml"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Generated Manifests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Manifest | File | Size | Resources |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|------|-----------|" >> $GITHUB_STEP_SUMMARY

          for MFILE in "$MANIFEST_FILE" "$MANIFEST_FILE_DIAB" "$MANIFEST_LAMBDA" "$MANIFEST_DC_SHIM"; do
            MNAME=$(basename "$MFILE")
            if [ -f "$MFILE" ]; then
              MSIZE=$(du -h "$MFILE" | cut -f1)
              MRESOURCES=$(grep -c "^kind: " "$MFILE" || true)
              echo "| $MNAME | \`$MFILE\` | $MSIZE | $MRESOURCES |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $MNAME | not generated | - | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail if main manifest wasn't created
          if [ ! -f "$MANIFEST_FILE" ]; then
            echo "Error: Main manifest not created" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "manifest_file=$MANIFEST_FILE" >> $GITHUB_OUTPUT
          echo "manifest_file_diab=$MANIFEST_FILE_DIAB" >> $GITHUB_OUTPUT
          echo "manifest_lambda=$MANIFEST_LAMBDA" >> $GITHUB_OUTPUT
          echo "manifest_dc_shim=$MANIFEST_DC_SHIM" >> $GITHUB_OUTPUT

      - name: Restore SPLUNK-VERSION
        run: mv SPLUNK-VERSION.backup SPLUNK-VERSION

      - name: Validate manifest YAML syntax
        if: ${{ inputs.validate_manifest }}
        run: |
          echo "### Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          for MFILE in "${{ steps.stitch.outputs.manifest_file }}" \
                       "${{ steps.stitch.outputs.manifest_file_diab }}" \
                       "${{ steps.stitch.outputs.manifest_lambda }}" \
                       "${{ steps.stitch.outputs.manifest_dc_shim }}"; do
            if [ -f "$MFILE" ]; then
              MNAME=$(basename "$MFILE")
              if python3 -c "import yaml; docs=list(yaml.safe_load_all(open('$MFILE'))); print(f'$MNAME: {len(docs)} documents')"; then
                echo "- $MNAME: **valid**" >> $GITHUB_STEP_SUMMARY
              else
                echo "- $MNAME: **INVALID**" >> $GITHUB_STEP_SUMMARY
                FAILED=1
              fi
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Types (Main):**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep "^kind: " "${{ steps.stitch.outputs.manifest_file }}" | sort | uniq -c | sort -rn >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Commit BETA manifests (optional)
        if: ${{ inputs.commit_manifest }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Force-add all BETA manifests (kubernetes/BETA/ is in .gitignore)
          for MFILE in "${{ steps.stitch.outputs.manifest_file }}" \
                       "${{ steps.stitch.outputs.manifest_file_diab }}" \
                       "${{ steps.stitch.outputs.manifest_lambda }}" \
                       "${{ steps.stitch.outputs.manifest_dc_shim }}"; do
            [ -f "$MFILE" ] && git add -f "$MFILE"
          done

          if git diff --staged --quiet; then
            echo "### No Changes" >> $GITHUB_STEP_SUMMARY
            echo "No changes to commit." >> $GITHUB_STEP_SUMMARY
          else
            git commit -m "beta-manifest: ${{ steps.version.outputs.test_version }}" \
              -m "Generated BETA manifests for Astronomy Shop (main + DIAB + lambda + dc-shim)" \
              -m "" \
              -m "- Base Version: ${{ steps.version.outputs.current_version }} (unchanged)" \
              -m "- Test Version: ${{ steps.version.outputs.test_version }}"

            git push

            echo "### Changes Committed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload manifests as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astronomy-shop-manifests-${{ steps.version.outputs.test_version }}
          path: |
            ${{ steps.stitch.outputs.manifest_file }}
            ${{ steps.stitch.outputs.manifest_file_diab }}
            ${{ steps.stitch.outputs.manifest_lambda }}
            ${{ steps.stitch.outputs.manifest_dc_shim }}
          retention-days: 7

      - name: Deploy commands
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Main (core services)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl apply -f ${{ steps.stitch.outputs.manifest_file }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### DIAB (includes ingress)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl apply -f ${{ steps.stitch.outputs.manifest_file_diab }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lambda (planning service)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl apply -f ${{ steps.stitch.outputs.manifest_lambda }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### DC Shim (shop-dc-shim + db + loadgen)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl apply -f ${{ steps.stitch.outputs.manifest_dc_shim }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### BETA Manifest Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Current Version** | \`${{ steps.version.outputs.current_version }}\` (unchanged) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Test Version** | \`${{ steps.version.outputs.test_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Main Manifest** | \`${{ steps.stitch.outputs.manifest_file }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **DIAB Manifest** | \`${{ steps.stitch.outputs.manifest_file_diab }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Lambda Manifest** | \`${{ steps.stitch.outputs.manifest_lambda }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **DC Shim Manifest** | \`${{ steps.stitch.outputs.manifest_dc_shim }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **SPLUNK-VERSION Modified** | No |" >> $GITHUB_STEP_SUMMARY
          echo "| **Validated** | ${{ inputs.validate_manifest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Committed** | ${{ inputs.commit_manifest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact Retention** | 7 days |" >> $GITHUB_STEP_SUMMARY

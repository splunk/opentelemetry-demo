AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Planning_Init Lambda - Entry point for AWS Lambda planning services.
  Receives orders from K8s planning service and routes to handlers.

Globals:
  Function:
    Timeout: 30
    Tags:
      splunkit_data_classification: public
      splunkit_environment_type: non-prd
    MemorySize: 256
    Runtime: python3.13
    Architectures:
      - arm64
    Environment:
      Variables:
        LOG_LEVEL: INFO
        OTEL_SERVICE_NAME: Planning_Init
        # Set OTEL_EXPORTER_OTLP_ENDPOINT to send traces to your collector
        # OTEL_EXPORTER_OTLP_ENDPOINT: http://your-collector:4317

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
      - demo
    Description: Deployment stage

  OtelCollectorEndpoint:
    Type: String
    Default: ""
    Description: OpenTelemetry collector endpoint (optional)

  DownstreamLambdaArn:
    Type: String
    Default: ""
    Description: ARN of downstream Lambda to forward orders (optional)

Resources:
  # API Gateway HTTP API
  PlanningApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - X-Amz-Date
          - Authorization
          - X-Api-Key
          - traceparent
          - tracestate
        AllowMethods:
          - POST
          - GET
          - OPTIONS

  # Main Lambda Function
  PlanningInitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "splunk-astronomy-${Stage}-planning-init"
      Description: Planning service entry point - processes orders from K8s
      CodeUri: ../
      Handler: Planning_Init.lambda_function.lambda_handler
      Environment:
        Variables:
          OTEL_EXPORTER_OTLP_ENDPOINT: !Ref OtelCollectorEndpoint
          DOWNSTREAM_LAMBDA_ARN: !Ref DownstreamLambdaArn
          STAGE: !Ref Stage
      VpcConfig:
        SecurityGroupIds:
          - sg-0f67076d7425fd810
        SubnetIds:
          - subnet-02cd39d6beb29495e
      Policies:
        - AWSLambdaBasicExecutionRole
        # Required for Lambda in VPC
        - AWSLambdaVPCAccessExecutionRole
        # Allow invoking other Lambda functions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: "*"
      Events:
        # Root path
        RootPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref PlanningApi
            Path: /
            Method: POST
        # Orders endpoint
        OrdersPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref PlanningApi
            Path: /orders
            Method: POST
        # Analytics endpoint
        AnalyticsPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref PlanningApi
            Path: /analytics
            Method: POST
        # Forecast endpoint
        ForecastPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref PlanningApi
            Path: /forecast
            Method: POST

Outputs:
  PlanningApiEndpoint:
    Description: API Gateway endpoint URL for Planning_Init
    Value: !Sub "https://${PlanningApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"

  PlanningInitFunctionArn:
    Description: Planning_Init Lambda Function ARN
    Value: !GetAtt PlanningInitFunction.Arn

  PlanningInitFunctionName:
    Description: Planning_Init Lambda Function Name
    Value: !Ref PlanningInitFunction

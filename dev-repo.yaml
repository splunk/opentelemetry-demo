#
# Format: ghcr.io/<your-github-username>/<your-repo-name>
# Examples:
#   ghcr.io/hagen-p/opentelemetry-demo-splunk
#   ghcr.io/yourname/otel-demo-fork

registry:
  dev: "ghcr.io/hagen-p/opentelemetry-demo-splunk"
